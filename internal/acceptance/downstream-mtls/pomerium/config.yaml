# Pomerium configuration for the downstream mTLS e2e suite.
#
# Mounted read-only into the official pomerium/pomerium image at
# /pomerium/config.yaml. Secrets are static on purpose (reproducible tests,
# same test-only values as the parent acceptance suite) - NEVER use them in
# production.

address: :8443
authenticate_service_url: https://authenticate.localhost.pomerium.io:8443

# Identity provider: Keycloak (realm fixtures shared with the parent suite).
idp_provider: oidc
idp_provider_url: http://keycloak.localhost.pomerium.io:8080/realms/pomerium-e2e
idp_client_id: pomerium
idp_client_secret: pomerium-e2e-secret
idp_scopes:
  - openid
  - profile
  - email
  - groups
  - offline_access

certificate_file: /certs/pomerium.crt
certificate_key_file: /certs/pomerium.key

cookie_secret: dj5y7E03ULP9YebCgHNIXmxWnWfYlVXCgwbm9IEdysI=
shared_secret: 0CdEkgO02jgxmgSC2AdkqIbFELAN4CGw0v0RY85xNr4=

log_level: debug

jwt_claims_headers:
  X-Pomerium-Claim-Email: email

# System under test: global downstream mTLS settings.
#
# The trust root is the ROOT CA only (not ca-chain.crt): max_verify_depth
# defaults to 1 counting chain certificates excluding the trust anchor, and
# any certificate in the CA bundle can act as an anchor. With the root alone,
# the root-signed client-valid cert passes at the default depth while the
# intermediate-signed client-chain cert requires an explicit
# max_verify_depth: 2 - which keeps chain-depth behavior testable.
#
# Enforcement is left at its default (policy_with_default_deny): the TLS
# handshake accepts any certificate, and requests without a valid one are
# denied by the authorize service with HTTP 495.
#
# Extension points for future specs: enforcement: policy | reject_connection,
# match_subject_alt_names, crl_file, max_verify_depth.
downstream_mtls:
  ca_file: /certs/mtls/root-ca.crt

routes:
  - from: https://mtls.localhost.pomerium.io:8443
    to: http://upstream:80
    pass_identity_headers: true
    policy:
      - allow:
          or:
            - authenticated_user: true
