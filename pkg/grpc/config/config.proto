syntax = "proto3";

package pomerium.config;

import "google/protobuf/duration.proto";
import "google/protobuf/field_mask.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/wrappers.proto";
import "options.proto";
import "validate/validate.proto";

option go_package = "github.com/pomerium/pomerium/pkg/grpc/config";

// A bundle of Pomerium configuration including routes and settings.
message Config {
  // The name of the configuration.
  string name = 1;
  // All of the routes in the configuration bundle.
  repeated Route routes = 2;
  // All of the settings for the configuration bundle.
  Settings settings = 3;
}

// A Config along with versioning conditions for when it should be applied.
message VersionedConfig {
  // The Config that will be applied if the versioning conditions are met.
  Config config = 1;

  // List of conditions that must hold in order to apply this config.
  repeated Condition conditions = 2;

  message Condition {
    // Feature gate version to check, or unset to check overall version.
    optional string feature = 1;

    // If set: specifies a minimum feature version (inclusive).
    optional string at_least = 2;

    // If set: specifies a maximum feature version (exclusive).
    optional string less_than = 3;
  }
}

// A rewrite rule applied to a single response header before the response is
// returned to the downstream client.
message RouteRewriteHeader {
  // The name of the response header to rewrite (case-insensitive).
  string header = 1;
  oneof matcher {
    // Only the portion of the header value that begins with this literal
    // prefix is replaced; the remainder is kept.
    string prefix = 3;
  }
  // The new value (or replacement substring, when `prefix` is set) to write
  // back to the header.
  string value = 2;
}

// Configuration for a route that redirects to a new URL.
message RouteRedirect {
  // Indicates that the incoming scheme of a request will be swapped with
  // "https".
  optional bool https_redirect = 1;
  // Indicates that the incoming scheme of a request will be swapped with
  // the given value.
  optional string scheme_redirect = 2;
  // Indicates that the incoming host of a request will be swapped with
  // the given value.
  optional string host_redirect = 3;
  // Indicates that the incoming port of a request will be swapped with
  // the given value.
  optional uint32 port_redirect = 4;
  // Indicates that the incoming path portion of a request URL will be
  // swapped with the given value.
  optional string path_redirect = 5;
  // Indicates that the incoming matched path prefix portion of a request
  // URL will be swapped with the given value.
  optional string prefix_rewrite = 6;
  // The response code used for the redirect. Defaults to 301.
  optional int32 response_code = 7;
  // Indicates that during redirection, the query portion of the URL will
  // be removed. Defaults to false.
  optional bool strip_query = 8;
}

// Configuration for a route direct response.
message RouteDirectResponse {
  // The status code that Pomerium returns for a static HTTP response.
  // For example, 200.
  uint32 status = 1;
  // The response body that Pomerium returns for a static HTTP
  // response.
  string body = 2;
}

// Format used for the `iss` claim of JWTs Pomerium issues for upstream
// requests.
enum IssuerFormat {
  // Issuer strings will be the hostname of the route, with no scheme or
  // trailing slash.
  IssuerHostOnly = 0;
  // Issuer strings will be a complete URI, including the scheme and ending
  // with a trailing slash.
  IssuerURI = 1;
}

// Controls how HTTP bearer token authentication is handled.
enum BearerTokenFormat {
  BEARER_TOKEN_FORMAT_UNKNOWN = 0;
  // The default behavior is to pass bearer tokens to upstream applications
  // without interpreting them.
  BEARER_TOKEN_FORMAT_DEFAULT = 1;
  // The bearer token will be interpreted as an IdP-issued access token.
  BEARER_TOKEN_FORMAT_IDP_ACCESS_TOKEN = 2;
  // The bearer token will be interpreted as an IdP-issued identity token.
  BEARER_TOKEN_FORMAT_IDP_IDENTITY_TOKEN = 3;
}

// CircuitBreakerThresholds defines CircuitBreaker settings.
message CircuitBreakerThresholds {
  // The maximum number of connections that Envoy will make to the upstream
  // cluster. If not specified, the default is 1024.
  optional uint32 max_connections = 1;
  // The maximum number of pending requests that Envoy will allow to the
  // upstream cluster. If not specified, the default is 1024. This limit is
  // applied as a connection limit for non-HTTP traffic.
  optional uint32 max_pending_requests = 2;
  // The maximum number of parallel requests that Envoy will make to the
  // upstream cluster. If not specified, the default is 1024. This limit does
  // not apply to non-HTTP traffic.
  optional uint32 max_requests = 3;
  // The maximum number of parallel retries that Envoy will allow to the
  // upstream cluster. If not specified, the default is 3.
  optional uint32 max_retries = 4;
  // The maximum number of connection pools per cluster that Envoy will
  // concurrently support at once. If not specified, the default is unlimited.
  // Set this for clusters which create a large number of connection pools.
  optional uint32 max_connection_pools = 5;
}

// EntityInfo is the basic metadata for an entity.
message EntityInfo {
  // The ID of the entity.
  optional string id = 1;
  // The name of the entity.
  optional string name = 2;
  // When the entity was last modified.
  optional google.protobuf.Timestamp modified_at = 3;
}

// SessionRecording defines session recording settings for routes.
message SessionRecording {
  // Toggle to enable/disable recording for this route.
  bool enabled = 1;
}

// Configuration for a route.
message Route {
  // Wrapper for a list of strings, used so map-valued fields can hold
  // repeated string values.
  message StringList {
    // The string values held by this list.
    repeated string values = 1;
  }

  // The id of the route.
  optional string id = 28;
  // The namespace id of the route.
  optional string namespace_id = 80;
  // The originator id of the route.
  optional string originator_id = 81;
  // The name of the route.
  optional string name = 1;
  // The name used for stats telemetry with the route.
  optional string stat_name = 75;
  // A human-readable description of the route.
  optional string description = 67;
  // A URL for a logo for the route.
  optional string logo_url = 68;
  // The externally accessible URL for a proxied HTTP request.
  string from = 2;
  // The destination(s) of a proxied request.
  repeated string to = 3;
  // Indicates that a route should be redirected.
  RouteRedirect redirect = 34;
  // Indicates that a route should return a direct response.
  RouteDirectResponse response = 62;
  // Optional load balancing weights for upstream servers defined in to.
  // If not specified, all upstream servers are assigned the same weight.
  // If provided, len(to) must equal len(load_balancing_weights).
  repeated uint32 load_balancing_weights = 37;
  // Grants access to the route if the logged-in user's ID matches one of the
  // given values. Deprecated in favor of the PPL user criterion.
  repeated string allowed_users = 4 [deprecated = true];
  reserved 5; // was allowed_groups
  // Grants access to the route if the logged-in user's email address is for
  // one of the given values. Deprecated in favor of the PPL domain criterion.
  repeated string allowed_domains = 6 [deprecated = true];
  // Grants access to the route if the logged-in user's session/user claims
  // match one of the given values. Deprecated in favor of the PPL claim
  // criterion.
  map<string, google.protobuf.ListValue> allowed_idp_claims = 32 [deprecated = true];
  // Only match requests that have a path that begins with the given prefix.
  string prefix = 7;
  // Only match requests whose path is an exact match for the given path.
  string path = 8;
  // Only match requests whose path matches the given regular expression.
  string regex = 9;
  // Indicates that when a request is forwarded, the matched prefix (or path)
  // will be swapped with this value.
  string prefix_rewrite = 29;
  // A regular expression used to rewrite the path of a forwarded request.
  string regex_rewrite_pattern = 30;
  // When a regular expression pattern is set, what the matched pattern will
  // be replaced with.
  string regex_rewrite_substitution = 31;
  // Determines the ordering of routes that use regular expressions.
  optional int64 regex_priority_order = 61;
  // Indicates that OPTIONS requests used for CORS can pass through
  // unauthenticated.
  bool cors_allow_preflight = 10;
  // Grants access to a route without requiring any authentication.
  bool allow_public_unauthenticated_access = 11;
  // Grants access to a route for any logged-in user.
  bool allow_any_authenticated_user = 33;
  // The per-route request timeout option. Cannot exceed global values.
  google.protobuf.Duration timeout = 12;
  // The per-route request timeout for a connection that is idle with
  // no data exchange.
  google.protobuf.Duration idle_timeout = 43;
  // Allow websocket requests. Also disables the default route timeout.
  bool allow_websockets = 13;
  // Allow SPDY protocol upgrade requests.
  bool allow_spdy = 44;
  // Indicates that pomerium should perform no verification on upstream
  // TLS connections. Any certificate for any hostname will be accepted.
  bool tls_skip_verify = 14;
  // The server name indication (SNI) for upstream TLS connections. If
  // both tls_server_name and tls_upstream_server_name are set,
  // tls_upstream_server_name will take precedence.
  string tls_server_name = 15 [deprecated = true];
  // The server name indication (SNI) for upstream TLS connections. If
  // both tls_server_name and tls_upstream_server_name are set,
  // tls_upstream_server_name will take precedence.
  string tls_upstream_server_name = 57;
  // The server name indication (SNI) for downstream TLS connections.
  string tls_downstream_server_name = 58;
  // The root certificate authorities (in PEM format) used to verify
  // certificates of upstream TLS connections.
  string tls_custom_ca = 16;
  // A file containing root certificate authorities (in PEM format)
  // used to verify certificates of upstream TLS connections.
  string tls_custom_ca_file = 17;
  // A reference to a key pair containing root certificate authorities (in PEM
  // format) used to verify certificates of upstream TLS connections.
  optional string tls_custom_ca_key_pair_id = 82;
  // The client certificate to present to upstream TLS connections for
  // mTLS.
  string tls_client_cert = 18;
  // The private key for the client certificate to present to upstream
  // TLS connections for mTLS.
  string tls_client_key = 19 [(sensitive) = true];
  // A file containing the client certificate to present to upstream TLS
  // connections for mTLS.
  string tls_client_cert_file = 20;
  // A file containing the private key for the client certificate to
  // present to upstream TLS connections for mTLS.
  string tls_client_key_file = 21;
  // A reference to the key pair containing the client certificate
  // and private key to present to upstream TLS connections for mTLS.
  optional string tls_client_key_pair_id = 83;
  // The root certificate authorities (in PEM format) used to verify
  // certificates for downstream TLS connections. If specified
  // downstream clients will be required to provide a valid client TLS
  // certificate.
  string tls_downstream_client_ca = 38 [deprecated = true];
  // A file containing the root certificate authorities (in PEM format) used to
  // verify certificates for downstream TLS connections. If specified
  // downstream clients will be required to provide a valid client TLS
  // certificate.
  string tls_downstream_client_ca_file = 39 [deprecated = true];
  // A reference to a key pair containing the root certificate authorities (in
  // PEM format) used to verify certificates for downstream TLS connections. If
  // specified downstream clients will be required to provide a valid client TLS
  // certificate.
  optional string tls_downstream_client_ca_key_pair_id = 84 [deprecated = true];
  // Controls whether server-initiated TLS renegotiation is allowed for
  // upstream servers.
  bool tls_upstream_allow_renegotiation = 60;
  // Allows you to set both static and dynamic headers for upstream requests.
  // Static values can be useful if you want to pass along additional
  // information to upstream applications as headers, or to set a fixed
  // authentication header on the request. Dynamic values enable you to pass
  // ID and Access tokens from your identity provider to upstream
  // applications. The following dynamic header values are supported:
  //
  // - ${pomerium.access_token}: OAuth access token from the identity provider.
  // - ${pomerium.client_cert_fingerprint}: Short-form SHA-256 fingerprint of the presented client certificate.
  // - ${pomerium.id_token}: OIDC ID token from the identity provider.
  // - ${pomerium.jwt}: The Pomerium assertion JWT for the logged-in user.
  map<string, string> set_request_headers = 22;
  // Headers to remove from upstream requests. This can be useful if you want to
  // prevent privacy information from being passed to upstream applications.
  repeated string remove_request_headers = 23;
  // Allows you to set static values for the given downstream response headers.
  // These headers will take precedence over the global set_response_headers.
  map<string, string> set_response_headers = 41;
  // Used to modify downstream response headers.
  repeated RouteRewriteHeader rewrite_response_headers = 40;
  reserved 54; // was set_authorization_header
  // Passes the Host (or :authority) header from the incoming request to the
  // upstream service, instead of the Host header from the route's to URL.
  bool preserve_host_header = 24;
  // Sends identity headers to all upstream applications. Identity headers
  // include:
  //
  // - X-Pomerium-Jwt-Assertion: The pomerium assertion JWT for the logged-in user.
  // - X-Pomerium-Claim-*: Each of the claim values specified by the jwt_claim_headers option.
  //
  // When not set explicitly, the global pass_identity_headers option will be used.
  optional bool pass_identity_headers = 25;

  // A Kubernetes service account token used to authenticate to the
  // Kubernetes API via Authorization: Bearer and Impersonate-User/Group
  // headers.
  string kubernetes_service_account_token = 26 [(sensitive) = true];
  // A file containing a Kubernetes service account token.
  string kubernetes_service_account_token_file = 64;
  // A key pair reference for a Kubernetes service account token.
  optional string kubernetes_service_account_token_key_pair_id = 85;
  // Adds an Authorization: Bearer ID_TOKEN header for Google Cloud
  // serverless upstream requests.
  bool enable_google_cloud_serverless_authentication = 42;
  // Controls the format of the iss claim in JWTs passed to upstream
  // services by this route.
  optional IssuerFormat jwt_issuer_format = 65;
  // Allowlist of group names or IDs to include in the Pomerium JWT for
  // this route.
  repeated string jwt_groups_filter = 66;
  // Whether to add JWT groups from any PPL policies.
  // Not supported in the open source version of Pomerium.
  optional bool jwt_groups_filter_infer_from_ppl = 89;
  // Controls how authorization bearer tokens are interpreted for this
  // route. When unset, the global bearer_token_format option is used.
  optional BearerTokenFormat bearer_token_format = 70;
  // Additional hosts that participate in chained login redirects for
  // this route. Up to five hosts are supported.
  repeated string depends_on = 71;

  reserved 36; // was envoy_opts

  // Structured sub-policies attached to this route.
  repeated Policy policies = 27;
  // PPL policies attached to this route.
  repeated PPLPolicy ppl_policies = 63;
  // IDs of policies assigned to this route.
  repeated string policy_ids = 86;

  // Rewrites the Host or :authority header to a fixed value.
  optional string host_rewrite = 50;
  // Rewrites the Host or :authority header using the value of another
  // request header.
  optional string host_rewrite_header = 51;
  // A regular expression used to rewrite the Host or :authority header
  // from the request path.
  optional string host_path_regex_rewrite_pattern = 52;
  // When host_path_regex_rewrite_pattern is set, what the matched
  // pattern will be replaced with to produce the Host header.
  optional string host_path_regex_rewrite_substitution = 53;

  // Overrides the global identity provider client ID for this route.
  optional string idp_client_id = 55;
  // Overrides the global identity provider client secret for this route.
  optional string idp_client_secret = 56 [(sensitive) = true];
  // Allowed audiences for validating IdP-issued access tokens for this
  // route.
  optional StringList idp_access_token_allowed_audiences = 69;
  // If true, include policy explanation and remediation details in
  // authorization error responses.
  bool show_error_details = 59;

  // Model Context Protocol configuration for this route. Requires the
  // runtime_flags.mcp feature flag.
  optional MCP mcp = 72;
  // Circuit breaker thresholds for upstream requests on this route.
  optional CircuitBreakerThresholds circuit_breaker_thresholds = 73;
  // Configuration for reverse tunneling to upstreams for this route.
  optional UpstreamTunnel upstream_tunnel = 74;

  // Passive health checking via outlier detection for upstream hosts on
  // this route.
  optional OutlierDetection outlier_detection = 76;
  // Active health checks to run against upstream hosts for this route.
  repeated HealthCheck health_checks = 77;
  // The load balancing algorithm for upstream endpoints. Options:
  // ROUND_ROBIN, RING_HASH, LEAST_REQUEST, RANDOM, MAGLEV.
  optional LoadBalancingPolicy load_balancing_policy = 78;
  // If the percentage of healthy upstream hosts drops below this value,
  // traffic will be sent to all hosts regardless of health status.
  optional int32 healthy_panic_threshold = 79;
  // Allows HTTP upgrade requests to be forwarded upstream.
  optional StringList allow_upgrades = 93;
  // Configures session recording behaviour on this route.
  // SSH specific.
  optional SessionRecording session_recording = 94;

  // computed properties

  // When the route was created.
  google.protobuf.Timestamp created_at = 87;
  // When the route was last modified.
  google.protobuf.Timestamp modified_at = 88;
  // Policies that are automatically enforced.
  // Not supported in the open source version of Pomerium.
  repeated EntityInfo enforced_policies = 90;
  // Info about policies assigned to this route.
  // Not supported in the open source version of Pomerium.
  repeated EntityInfo assigned_policies = 91;
  // The name of the namespace for the route.
  optional string namespace_name = 92;
}

// Configuration for an upstream tunnel. Applies to routes whose upstream is
// reached through Pomerium's SSH proxy.
message UpstreamTunnel {
  // PPL policy enforced before the SSH tunnel is opened to the upstream.
  optional PPLPolicy ssh_policy = 1;
  // Rego rules evaluated before the SSH tunnel is opened to the upstream.
  repeated string ssh_policy_rego = 2;
  // ID of a shared policy whose rules also gate this SSH tunnel.
  optional string ssh_policy_id = 3;
}

// Configuration for an MCP route.
message MCP {
  oneof mode {
    // Indicates that this route fronts an MCP server.
    MCPServer server = 1;
    // Provides an application with external tokens for MCP server access.
    MCPClient client = 2;
  }
}

// Configuration for an MCP server route.
message MCPServer {
  // Specifies that before the request reaches the MCP upstream server,
  // it should acquire an OAuth2 token.
  optional UpstreamOAuth2 upstream_oauth2 = 1;
  // The maximum request body size in bytes that can be sent to the MCP
  // server (default: 4KiB).
  optional uint32 max_request_bytes = 2;
  // The path to append to the URL when returning the server URL in the
  // .mcp/routes endpoint. Defaults to "/".
  optional string path = 3;
  // The issuer URL of the upstream authorization server. Used as a fallback
  // when PRM (RFC 9728) discovery fails, per the MCP spec's "abort or use
  // pre-configured values" guidance.
  optional string authorization_server_url = 4;
}

// Configuration for an MCP client route.
message MCPClient {}

// Configuration for OAuth2 authorization for an upstream service behind
// Pomerium.
message UpstreamOAuth2 {
  // The public identifier for an application.
  string client_id = 1;
  // The secret known only to the application and the authorization server.
  string client_secret = 2 [(sensitive) = true];
  // The OAuth2 endpoint configuration.
  OAuth2Endpoint oauth2_endpoint = 3;
  // Scope to control what data the OAuth2 server returns.
  repeated string scopes = 4;
  // Additional parameters to add to authorization requests.
  map<string, string> authorization_url_params = 5;
}

// Configuration for an OAuth2 server endpoint.
message OAuth2Endpoint {
  // The authorization URL.
  string auth_url = 1;
  // The token URL.
  string token_url = 2;
  // if unset, auto-detect which authentication
  // style the provider wants by trying both ways and caching
  // the successful way for the future.
  optional OAuth2AuthStyle auth_style = 3;
}

// How the OAuth2 client identifies itself to the authorization server when
// fetching tokens.
enum OAuth2AuthStyle {
  OAUTH2_AUTH_STYLE_UNSPECIFIED = 0;

  // OAUTH2_AUTH_STYLE_IN_PARAMS sends the "client_id" and "client_secret"
  // in the POST body as application/x-www-form-urlencoded parameters.
  OAUTH2_AUTH_STYLE_IN_PARAMS = 1;
  // OAUTH2_AUTH_STYLE_IN_HEADER sends the client_id and client_password
  // using HTTP Basic Authorization. This is an optional style
  // described in the OAuth2 RFC 6749 section 2.3.1.
  OAUTH2_AUTH_STYLE_IN_HEADER = 2;
}

// A policy expressed in Pomerium Policy Language (PPL).
message PPLPolicy {
  // The serialized PPL document as raw bytes (typically YAML).
  bytes raw = 1;
}

// Configuration for a policy.
message Policy {
  // Server-assigned unique ID of the policy.
  optional string id = 1;
  // ID of the namespace the policy belongs to.
  optional string namespace_id = 11;
  // ID of the upstream object the policy originated from, when imported.
  optional string originator_id = 12;
  // Human-readable name of the policy.
  optional string name = 2;
  // Free-form description of what the policy is for.
  optional string description = 13;
  // An enforced policy is automatically applied to routes.
  // Not supported in the open source version of Pomerium.
  optional bool enforced = 14;
  // Grants access if the logged-in user's ID matches one of the given values.
  repeated string allowed_users = 3;
  reserved 4; // was allowed_groups
  // Grants access if the logged-in user's email address domain matches one
  // of the given values.
  repeated string allowed_domains = 5;
  // Grants access if the logged-in user's IdP claims include one of the
  // listed key/value pairs.
  map<string, google.protobuf.ListValue> allowed_idp_claims = 7;
  // Rego rules that authorize requests. All rules must allow for access to
  // be granted.
  repeated string rego = 6;
  // The original PPL source the policy was compiled from, when available.
  optional string source_ppl = 10;
  // Free-form text shown to the user explaining why this policy applies.
  optional string explanation = 8;
  // Free-form text shown to the user telling them how to gain access when
  // this policy denies the request.
  optional string remediation = 9;

  // computed properties

  // When the policy was created.
  google.protobuf.Timestamp created_at = 15;
  // When the policy was last modified.
  google.protobuf.Timestamp modified_at = 16;
  // Routes that are automatically enforced by this policy.
  // Not supported in the open source version of Pomerium.
  repeated EntityInfo enforced_routes = 17;
  // Info about routes with this policy assigned.
  // Not supported in the open source version of Pomerium.
  repeated EntityInfo assigned_routes = 18;
  // The name of the namespace for the policy.
  optional string namespace_name = 19;
}

// Global Pomerium configuration settings.
message Settings {
  // An inline TLS certificate/key pair Pomerium serves for matching SNI
  // hostnames.
  message Certificate {
    // PEM-encoded certificate chain.
    bytes cert_bytes = 3;
    // PEM-encoded private key matching `cert_bytes`.
    bytes key_bytes = 4 [(sensitive) = true];
    // Optional identifier for the certificate, used to refer to it from
    // other parts of the configuration.
    string id = 5;
  }
  // One peer in a Pomerium databroker Raft cluster.
  message DataBrokerClusterNode {
    // Stable identifier of the node within the cluster.
    string id = 1;
    // gRPC service address (host:port) other components dial to reach this
    // databroker node.
    string grpc_address = 2;
    // Raft transport address (host:port) used for peer-to-peer replication.
    optional string raft_address = 3;
  }
  // Aggregate list of databroker cluster peers.
  message DataBrokerClusterNodes {
    // Every node participating in the databroker cluster.
    repeated DataBrokerClusterNode nodes = 1;
  }
  // Wrapper for a list of strings, used so map-valued Settings fields can
  // hold repeated string values.
  message StringList {
    // The string values held by this list.
    repeated string values = 1;
  }

  // Server-assigned unique ID of the Settings record.
  optional string id = 158;
  // ID of the namespace the Settings record belongs to.
  optional string namespace_id = 159;
  // ID of the cluster the Settings record applies to.
  optional string cluster_id = 176;
  // ID of the upstream object the record originated from, when imported.
  optional string originator_id = 160;
  // Human-readable name of the Settings record.
  optional string name = 161;
  // Stable identifier for this installation, used in telemetry and
  // diagnostics. Generated at first start when unset.
  optional string installation_id = 71;
  // Global log level for Pomerium services ("debug", "info", "warn",
  // "error"). Empty falls back to "info".
  optional string log_level = 3;
  // Subset of access-log fields to emit. Use
  // ListAvailableLogFields.available_access_log_fields to see what's valid;
  // unset means the service default.
  optional StringList access_log_fields = 114;
  // Subset of authorize-log fields to emit; see ListAvailableLogFields.
  optional StringList authorize_log_fields = 115;
  // Log level for the proxy service in particular, overriding `log_level`.
  optional string proxy_log_level = 4;
  // Cluster-wide shared secret used to sign and validate internal requests
  // and JWTs across Pomerium services. Must be a base64-encoded 32-byte
  // value.
  optional string shared_secret = 5 [(sensitive) = true];
  // Comma-separated list of Pomerium services to run in this process
  // ("all", "authenticate", "authorize", "databroker", "proxy").
  optional string services = 6;
  // IP address and port for serving HTTPS requests (e.g. ":443").
  optional string address = 7;
  // When true, Pomerium serves HTTP without TLS. Intended only for testing
  // behind a TLS-terminating load balancer.
  optional bool insecure_server = 8;

  // dns options

  // How long Envoy waits before retrying a failed DNS resolution.
  optional google.protobuf.Duration dns_failure_refresh_rate = 153;
  // Envoy DNS lookup family ("AUTO", "V4_ONLY", "V6_ONLY", "V4_PREFERRED",
  // "ALL"). Controls which address families Envoy resolves.
  optional string dns_lookup_family = 60;
  // Maximum time Envoy waits for a single DNS query to return.
  optional google.protobuf.Duration dns_query_timeout = 149;
  // Number of times Envoy retries a failed DNS query before giving up.
  optional uint32 dns_query_tries = 148;
  // How often Envoy refreshes resolved addresses regardless of TTL.
  optional google.protobuf.Duration dns_refresh_rate = 154;
  // Maximum number of in-flight DNS queries Envoy will multiplex over a
  // single UDP socket.
  optional uint32 dns_udp_max_queries = 146;
  // When true, Envoy resolves DNS over TCP instead of UDP.
