      description: Configuration for an OAuth2 server endpoint.
    pomerium.config.OutlierDetection:
      type: object
      properties:
        consecutive5xx:
          title: consecutive_5xx
          description: |-
            The number of consecutive server-side error responses (for HTTP traffic,
             5xx responses; for TCP traffic, connection failures; for Redis, failure to
             respond PONG; etc.) before a consecutive 5xx ejection occurs. Defaults to 5.
          $ref: '#/components/schemas/google.protobuf.UInt32Value'
        interval:
          title: interval
          description: |-
            The time interval between ejection analysis sweeps. This can result in
             both new ejections as well as hosts being returned to service. Defaults
             to 10000ms or 10s.
          $ref: '#/components/schemas/google.protobuf.Duration'
        baseEjectionTime:
          title: base_ejection_time
          description: |-
            The base time that a host is ejected for. The real time is equal to the
             base time multiplied by the number of times the host has been ejected and is
             capped by :ref:`max_ejection_time<envoy_v3_api_field_config.cluster.v3.OutlierDetection.max_ejection_time>`.
             Defaults to 30000ms or 30s.
          $ref: '#/components/schemas/google.protobuf.Duration'
        maxEjectionPercent:
          title: max_ejection_percent
          description: |-
            The maximum % of an upstream cluster that can be ejected due to outlier detection. Defaults to 10% .
             Will eject at least one host regardless of the value if :ref:`always_eject_one_host<envoy_v3_api_field_config.cluster.v3.OutlierDetection.always_eject_one_host>` is enabled.
          $ref: '#/components/schemas/google.protobuf.UInt32Value'
        enforcingConsecutive5xx:
          title: enforcing_consecutive_5xx
          description: |-
            The % chance that a host will be actually ejected when an outlier status
             is detected through consecutive 5xx. This setting can be used to disable
             ejection or to ramp it up slowly. Defaults to 100.
          $ref: '#/components/schemas/google.protobuf.UInt32Value'
        enforcingSuccessRate:
          title: enforcing_success_rate
          description: |-
            The % chance that a host will be actually ejected when an outlier status
             is detected through success rate statistics. This setting can be used to
             disable ejection or to ramp it up slowly. Defaults to 100.
          $ref: '#/components/schemas/google.protobuf.UInt32Value'
        successRateMinimumHosts:
          title: success_rate_minimum_hosts
          description: |-
            The number of hosts in a cluster that must have enough request volume to
             detect success rate outliers. If the number of hosts is less than this
             setting, outlier detection via success rate statistics is not performed
             for any host in the cluster. Defaults to 5.
          $ref: '#/components/schemas/google.protobuf.UInt32Value'
        successRateRequestVolume:
          title: success_rate_request_volume
          description: |-
            The minimum number of total requests that must be collected in one
             interval (as defined by the interval duration above) to include this host
             in success rate based outlier detection. If the volume is lower than this
             setting, outlier detection via success rate statistics is not performed
             for that host. Defaults to 100.
          $ref: '#/components/schemas/google.protobuf.UInt32Value'
        successRateStdevFactor:
          title: success_rate_stdev_factor
          description: |-
            This factor is used to determine the ejection threshold for success rate
             outlier ejection. The ejection threshold is the difference between the
             mean success rate, and the product of this factor and the standard
             deviation of the mean success rate: mean - (stdev *
             success_rate_stdev_factor). This factor is divided by a thousand to get a
             double. That is, if the desired factor is 1.9, the runtime value should
             be 1900. Defaults to 1900.
          $ref: '#/components/schemas/google.protobuf.UInt32Value'
        consecutiveGatewayFailure:
          title: consecutive_gateway_failure
          description: |-
            The number of consecutive gateway failures (502, 503, 504 status codes)
             before a consecutive gateway failure ejection occurs. Defaults to 5.
          $ref: '#/components/schemas/google.protobuf.UInt32Value'
        enforcingConsecutiveGatewayFailure:
          title: enforcing_consecutive_gateway_failure
          description: |-
            The % chance that a host will be actually ejected when an outlier status
             is detected through consecutive gateway failures. This setting can be
             used to disable ejection or to ramp it up slowly. Defaults to 0.
          $ref: '#/components/schemas/google.protobuf.UInt32Value'
        splitExternalLocalOriginErrors:
          type: boolean
          title: split_external_local_origin_errors
          description: |-
            Determines whether to distinguish local origin failures from external errors. If set to true
             the following configuration parameters are taken into account:
             :ref:`consecutive_local_origin_failure<envoy_v3_api_field_config.cluster.v3.OutlierDetection.consecutive_local_origin_failure>`,
             :ref:`enforcing_consecutive_local_origin_failure<envoy_v3_api_field_config.cluster.v3.OutlierDetection.enforcing_consecutive_local_origin_failure>`
             and
             :ref:`enforcing_local_origin_success_rate<envoy_v3_api_field_config.cluster.v3.OutlierDetection.enforcing_local_origin_success_rate>`.
             Defaults to false.
        consecutiveLocalOriginFailure:
          title: consecutive_local_origin_failure
          description: |-
            The number of consecutive locally originated failures before ejection
             occurs. Defaults to 5. Parameter takes effect only when
             :ref:`split_external_local_origin_errors<envoy_v3_api_field_config.cluster.v3.OutlierDetection.split_external_local_origin_errors>`
             is set to true.
          $ref: '#/components/schemas/google.protobuf.UInt32Value'
        enforcingConsecutiveLocalOriginFailure:
          title: enforcing_consecutive_local_origin_failure
          description: |-
            The % chance that a host will be actually ejected when an outlier status
             is detected through consecutive locally originated failures. This setting can be
             used to disable ejection or to ramp it up slowly. Defaults to 100.
             Parameter takes effect only when
             :ref:`split_external_local_origin_errors<envoy_v3_api_field_config.cluster.v3.OutlierDetection.split_external_local_origin_errors>`
             is set to true.
          $ref: '#/components/schemas/google.protobuf.UInt32Value'
        enforcingLocalOriginSuccessRate:
          title: enforcing_local_origin_success_rate
          description: |-
            The % chance that a host will be actually ejected when an outlier status
             is detected through success rate statistics for locally originated errors.
             This setting can be used to disable ejection or to ramp it up slowly. Defaults to 100.
             Parameter takes effect only when
             :ref:`split_external_local_origin_errors<envoy_v3_api_field_config.cluster.v3.OutlierDetection.split_external_local_origin_errors>`
             is set to true.
          $ref: '#/components/schemas/google.protobuf.UInt32Value'
        failurePercentageThreshold:
          title: failure_percentage_threshold
          description: |-
            The failure percentage to use when determining failure percentage-based outlier detection. If
             the failure percentage of a given host is greater than or equal to this value, it will be
             ejected. Defaults to 85.
          $ref: '#/components/schemas/google.protobuf.UInt32Value'
        enforcingFailurePercentage:
          title: enforcing_failure_percentage
          description: |-
            The % chance that a host will be actually ejected when an outlier status is detected through
             failure percentage statistics. This setting can be used to disable ejection or to ramp it up
             slowly. Defaults to 0.

             [#next-major-version: setting this without setting failure_percentage_threshold should be
             invalid in v4.]
          $ref: '#/components/schemas/google.protobuf.UInt32Value'
        enforcingFailurePercentageLocalOrigin:
          title: enforcing_failure_percentage_local_origin
          description: |-
            The % chance that a host will be actually ejected when an outlier status is detected through
             local-origin failure percentage statistics. This setting can be used to disable ejection or to
             ramp it up slowly. Defaults to 0.
          $ref: '#/components/schemas/google.protobuf.UInt32Value'
        failurePercentageMinimumHosts:
          title: failure_percentage_minimum_hosts
          description: |-
            The minimum number of hosts in a cluster in order to perform failure percentage-based ejection.
             If the total number of hosts in the cluster is less than this value, failure percentage-based
             ejection will not be performed. Defaults to 5.
          $ref: '#/components/schemas/google.protobuf.UInt32Value'
        failurePercentageRequestVolume:
          title: failure_percentage_request_volume
          description: |-
            The minimum number of total requests that must be collected in one interval (as defined by the
             interval duration above) to perform failure percentage-based ejection for this host. If the
             volume is lower than this setting, failure percentage-based ejection will not be performed for
             this host. Defaults to 50.
          $ref: '#/components/schemas/google.protobuf.UInt32Value'
        maxEjectionTime:
          title: max_ejection_time
          description: |-
            The maximum time that a host is ejected for. See :ref:`base_ejection_time<envoy_v3_api_field_config.cluster.v3.OutlierDetection.base_ejection_time>`
             for more information. If not specified, the default value (300000ms or 300s) or
             :ref:`base_ejection_time<envoy_v3_api_field_config.cluster.v3.OutlierDetection.base_ejection_time>` value is applied, whatever is larger.
          $ref: '#/components/schemas/google.protobuf.Duration'
        maxEjectionTimeJitter:
          title: max_ejection_time_jitter
          description: |-
            The maximum amount of jitter to add to the ejection time, in order to prevent
             a 'thundering herd' effect where all proxies try to reconnect to host at the same time.
             See :ref:`max_ejection_time_jitter<envoy_v3_api_field_config.cluster.v3.OutlierDetection.base_ejection_time>`
             Defaults to 0s.
          $ref: '#/components/schemas/google.protobuf.Duration'
        successfulActiveHealthCheckUnejectHost:
          title: successful_active_health_check_uneject_host
          description: |-
            If active health checking is enabled and a host is ejected by outlier detection, a successful active health check
             unejects the host by default and considers it as healthy. Unejection also clears all the outlier detection counters.
             To change this default behavior set this config to ``false`` where active health checking will not uneject the host.
             Defaults to true.
          $ref: '#/components/schemas/google.protobuf.BoolValue'
        alwaysEjectOneHost:
          title: always_eject_one_host
          description: |-
            If enabled, at least one host is ejected regardless of the value of :ref:`max_ejection_percent<envoy_v3_api_field_config.cluster.v3.OutlierDetection.max_ejection_percent>`.
             Defaults to false.
          $ref: '#/components/schemas/google.protobuf.BoolValue'
      title: OutlierDetection
      additionalProperties: false
    pomerium.config.PPLPolicy:
      type: object
      properties:
        raw:
          type: string
          title: raw
          format: byte
          description: The serialized PPL document as raw bytes (typically YAML).
      title: PPLPolicy
      additionalProperties: false
      description: A policy expressed in Pomerium Policy Language (PPL).
    pomerium.config.PathWithEscapedSlashesAction:
      type: string
      title: PathWithEscapedSlashesAction
      enum:
        - PATH_WITH_ESCAPED_SLASHES_ACTION_UNKNOWN
        - PATH_WITH_ESCAPED_SLASHES_ACTION_KEEP_UNCHANGED
        - PATH_WITH_ESCAPED_SLASHES_ACTION_REJECT_REQUEST
        - PATH_WITH_ESCAPED_SLASHES_ACTION_UNESCAPE_AND_REDIRECT
        - PATH_WITH_ESCAPED_SLASHES_ACTION_UNESCAPE_AND_FORWARD
      description: |-
        PathWithEscapedSlashesAction determines the action for request that contain
         %2F, %2f, %5C or %5c sequences in the URI path.
    pomerium.config.Policy:
      type: object
      properties:
        id:
          type:
            - string
            - "null"
          title: id
          description: Server-assigned unique ID of the policy.
        namespaceId:
          type:
            - string
            - "null"
          title: namespace_id
          description: ID of the namespace the policy belongs to.
        originatorId:
          type:
            - string
            - "null"
          title: originator_id
          description: ID of the upstream object the policy originated from, when imported.
        name:
          type:
            - string
            - "null"
          title: name
          description: Human-readable name of the policy.
        description:
          type:
            - string
            - "null"
          title: description
          description: Free-form description of what the policy is for.
        enforced:
          type:
            - boolean
            - "null"
          title: enforced
          description: |-
            An enforced policy is automatically applied to routes.
             Not supported in the open source version of Pomerium.
        allowedUsers:
          type: array
          items:
            type: string
          title: allowed_users
          description: Grants access if the logged-in user's ID matches one of the given values.
        allowedDomains:
          type: array
          items:
            type: string
          title: allowed_domains
          description: |-
            Grants access if the logged-in user's email address domain matches one
             of the given values.
        allowedIdpClaims:
          type: object
          title: allowed_idp_claims
          additionalProperties:
            title: value
            $ref: '#/components/schemas/google.protobuf.ListValue'
          description: |-
            Grants access if the logged-in user's IdP claims include one of the
             listed key/value pairs.
        rego:
          type: array
          items:
            type: string
          title: rego
          description: |-
            Rego rules that authorize requests. All rules must allow for access to
             be granted.
        sourcePpl:
          type:
            - string
            - "null"
          title: source_ppl
          description: The original PPL source the policy was compiled from, when available.
        explanation:
          type:
            - string
            - "null"
          title: explanation
          description: Free-form text shown to the user explaining why this policy applies.
        remediation:
          type:
            - string
            - "null"
          title: remediation
          description: |-
            Free-form text shown to the user telling them how to gain access when
             this policy denies the request.
        createdAt:
          title: created_at
          description: When the policy was created.
          readOnly: true
          $ref: '#/components/schemas/google.protobuf.Timestamp'
        modifiedAt:
          title: modified_at
          description: When the policy was last modified.
          readOnly: true
          $ref: '#/components/schemas/google.protobuf.Timestamp'
        enforcedRoutes:
          type: array
          items:
            $ref: '#/components/schemas/pomerium.config.EntityInfo'
          title: enforced_routes
          description: |-
            Routes that are automatically enforced by this policy.
             Not supported in the open source version of Pomerium.
          readOnly: true
        assignedRoutes:
          type: array
          items:
            $ref: '#/components/schemas/pomerium.config.EntityInfo'
          title: assigned_routes
          description: |-
            Info about routes with this policy assigned.
             Not supported in the open source version of Pomerium.
          readOnly: true
        namespaceName:
          type:
            - string
            - "null"
          title: namespace_name
          description: The name of the namespace for the policy.
          readOnly: true
      title: Policy
      additionalProperties: false
      description: Configuration for a policy.
    pomerium.config.Policy.AllowedIdpClaimsEntry:
      type: object
      properties:
        key:
          type: string
          title: key
        value:
          title: value
          $ref: '#/components/schemas/google.protobuf.ListValue'
      title: AllowedIdpClaimsEntry
      additionalProperties: false
    pomerium.config.Route:
      type: object
      properties:
        id:
          type:
            - string
            - "null"
          title: id
          description: The id of the route.
        namespaceId:
          type:
            - string
            - "null"
          title: namespace_id
          description: The namespace id of the route.
        originatorId:
          type:
            - string
            - "null"
          title: originator_id
          description: The originator id of the route.
        name:
          type:
            - string
            - "null"
          title: name
          description: The name of the route.
        statName:
          type:
            - string
            - "null"
          title: stat_name
          description: The name used for stats telemetry with the route.
        description:
          type:
            - string
            - "null"
          title: description
          description: A human-readable description of the route.
        logoUrl:
          type:
            - string
            - "null"
          title: logo_url
          description: A URL for a logo for the route.
        from:
          type: string
          title: from
          description: The externally accessible URL for a proxied HTTP request.
        to:
          type: array
          items:
            type: string
          title: to
          description: The destination(s) of a proxied request.
        redirect:
          title: redirect
          description: Indicates that a route should be redirected.
          $ref: '#/components/schemas/pomerium.config.RouteRedirect'
        response:
          title: response
          description: Indicates that a route should return a direct response.
          $ref: '#/components/schemas/pomerium.config.RouteDirectResponse'
        loadBalancingWeights:
          type: array
          items:
            type: integer
          title: load_balancing_weights
          description: |-
            Optional load balancing weights for upstream servers defined in to.
             If not specified, all upstream servers are assigned the same weight.
             If provided, len(to) must equal len(load_balancing_weights).
        allowedUsers:
          type: array
          items:
            type: string
            deprecated: true
          title: allowed_users
          description: |-
            Grants access to the route if the logged-in user's ID matches one of the
             given values. Deprecated in favor of the PPL user criterion.
          deprecated: true
        allowedDomains:
          type: array
          items:
            type: string
            deprecated: true
          title: allowed_domains
          description: |-
            Grants access to the route if the logged-in user's email address is for
             one of the given values. Deprecated in favor of the PPL domain criterion.
          deprecated: true
        allowedIdpClaims:
          type: object
          title: allowed_idp_claims
          additionalProperties:
            title: value
            $ref: '#/components/schemas/google.protobuf.ListValue'
          description: |-
            Grants access to the route if the logged-in user's session/user claims
             match one of the given values. Deprecated in favor of the PPL claim
             criterion.
          deprecated: true
        prefix:
          type: string
          title: prefix
          description: Only match requests that have a path that begins with the given prefix.
        path:
          type: string
          title: path
          description: Only match requests whose path is an exact match for the given path.
        regex:
          type: string
          title: regex
          description: Only match requests whose path matches the given regular expression.
        prefixRewrite:
          type: string
          title: prefix_rewrite
          description: |-
            Indicates that when a request is forwarded, the matched prefix (or path)
             will be swapped with this value.
        regexRewritePattern:
          type: string
          title: regex_rewrite_pattern
          description: A regular expression used to rewrite the path of a forwarded request.
        regexRewriteSubstitution:
          type: string
          title: regex_rewrite_substitution
          description: |-
            When a regular expression pattern is set, what the matched pattern will
             be replaced with.
        regexPriorityOrder:
          type:
            - integer
            - string
            - "null"
          title: regex_priority_order
          format: int64
          description: Determines the ordering of routes that use regular expressions.
        corsAllowPreflight:
          type: boolean
          title: cors_allow_preflight
          description: |-
            Indicates that OPTIONS requests used for CORS can pass through
             unauthenticated.
        allowPublicUnauthenticatedAccess:
          type: boolean
          title: allow_public_unauthenticated_access
          description: Grants access to a route without requiring any authentication.
        allowAnyAuthenticatedUser:
          type: boolean
          title: allow_any_authenticated_user
          description: Grants access to a route for any logged-in user.
        timeout:
          title: timeout
          description: The per-route request timeout option. Cannot exceed global values.
          $ref: '#/components/schemas/google.protobuf.Duration'
        idleTimeout:
          title: idle_timeout
          description: |-
            The per-route request timeout for a connection that is idle with
             no data exchange.
          $ref: '#/components/schemas/google.protobuf.Duration'
        allowWebsockets:
          type: boolean
          title: allow_websockets
          description: Allow websocket requests. Also disables the default route timeout.
        allowSpdy:
          type: boolean
          title: allow_spdy
          description: Allow SPDY protocol upgrade requests.
        tlsSkipVerify:
          type: boolean
          title: tls_skip_verify
          description: |-
            Indicates that pomerium should perform no verification on upstream
             TLS connections. Any certificate for any hostname will be accepted.
        tlsServerName:
          type: string
          title: tls_server_name
          description: |-
            The server name indication (SNI) for upstream TLS connections. If
             both tls_server_name and tls_upstream_server_name are set,
             tls_upstream_server_name will take precedence.
          deprecated: true
        tlsUpstreamServerName:
          type: string
          title: tls_upstream_server_name
          description: |-
            The server name indication (SNI) for upstream TLS connections. If
             both tls_server_name and tls_upstream_server_name are set,
             tls_upstream_server_name will take precedence.
        tlsDownstreamServerName:
          type: string
          title: tls_downstream_server_name
          description: The server name indication (SNI) for downstream TLS connections.
        tlsCustomCa:
          type: string
          title: tls_custom_ca
          description: |-
            The root certificate authorities (in PEM format) used to verify
             certificates of upstream TLS connections.
        tlsCustomCaFile:
          type: string
          title: tls_custom_ca_file
          description: |-
            A file containing root certificate authorities (in PEM format)
             used to verify certificates of upstream TLS connections.
        tlsCustomCaKeyPairId:
          type:
            - string
            - "null"
          title: tls_custom_ca_key_pair_id
          description: |-
            A reference to a key pair containing root certificate authorities (in PEM
             format) used to verify certificates of upstream TLS connections.
        tlsClientCert:
          type: string
          title: tls_client_cert
          description: |-
            The client certificate to present to upstream TLS connections for
             mTLS.
        tlsClientKey:
          type: string
          title: tls_client_key
          description: |-
            The private key for the client certificate to present to upstream
             TLS connections for mTLS.
        tlsClientCertFile:
          type: string
          title: tls_client_cert_file
          description: |-
            A file containing the client certificate to present to upstream TLS
             connections for mTLS.
        tlsClientKeyFile:
          type: string
          title: tls_client_key_file
          description: |-
            A file containing the private key for the client certificate to
             present to upstream TLS connections for mTLS.
        tlsClientKeyPairId:
          type:
            - string
            - "null"
          title: tls_client_key_pair_id
          description: |-
            A reference to the key pair containing the client certificate
             and private key to present to upstream TLS connections for mTLS.
        tlsDownstreamClientCa:
          type: string
          title: tls_downstream_client_ca
          description: |-
            The root certificate authorities (in PEM format) used to verify
             certificates for downstream TLS connections. If specified
             downstream clients will be required to provide a valid client TLS
             certificate.
          deprecated: true
        tlsDownstreamClientCaFile:
          type: string
          title: tls_downstream_client_ca_file
          description: |-
            A file containing the root certificate authorities (in PEM format) used to
             verify certificates for downstream TLS connections. If specified
             downstream clients will be required to provide a valid client TLS
             certificate.
          deprecated: true
        tlsDownstreamClientCaKeyPairId:
          type:
            - string
            - "null"
          title: tls_downstream_client_ca_key_pair_id
          description: |-
            A reference to a key pair containing the root certificate authorities (in
             PEM format) used to verify certificates for downstream TLS connections. If
             specified downstream clients will be required to provide a valid client TLS
             certificate.
          deprecated: true
        tlsUpstreamAllowRenegotiation:
          type: boolean
          title: tls_upstream_allow_renegotiation
          description: |-
            Controls whether server-initiated TLS renegotiation is allowed for
             upstream servers.
        setRequestHeaders:
          type: object
          title: set_request_headers
          additionalProperties:
            type: string
            title: value
          description: |-
            Allows you to set both static and dynamic headers for upstream requests.
             Static values can be useful if you want to pass along additional
             information to upstream applications as headers, or to set a fixed
             authentication header on the request. Dynamic values enable you to pass
             ID and Access tokens from your identity provider to upstream
             applications. The following dynamic header values are supported:

             - ${pomerium.access_token}: OAuth access token from the identity provider.
             - ${pomerium.client_cert_fingerprint}: Short-form SHA-256 fingerprint of the presented client certificate.
             - ${pomerium.id_token}: OIDC ID token from the identity provider.
             - ${pomerium.jwt}: The Pomerium assertion JWT for the logged-in user.
        removeRequestHeaders:
          type: array
          items:
            type: string
          title: remove_request_headers
          description: |-
            Headers to remove from upstream requests. This can be useful if you want to
             prevent privacy information from being passed to upstream applications.
        setResponseHeaders:
          type: object
          title: set_response_headers
          additionalProperties:
            type: string
            title: value
          description: |-
            Allows you to set static values for the given downstream response headers.
             These headers will take precedence over the global set_response_headers.
        rewriteResponseHeaders:
          type: array
          items:
            $ref: '#/components/schemas/pomerium.config.RouteRewriteHeader'
          title: rewrite_response_headers
          description: Used to modify downstream response headers.
        preserveHostHeader:
          type: boolean
          title: preserve_host_header
          description: |-
            Passes the Host (or :authority) header from the incoming request to the
             upstream service, instead of the Host header from the route's to URL.
        passIdentityHeaders:
          type:
            - boolean
            - "null"
          title: pass_identity_headers
          description: |-
            Sends identity headers to all upstream applications. Identity headers
             include:

             - X-Pomerium-Jwt-Assertion: The pomerium assertion JWT for the logged-in user.
             - X-Pomerium-Claim-*: Each of the claim values specified by the jwt_claim_headers option.

             When not set explicitly, the global pass_identity_headers option will be used.
        kubernetesServiceAccountToken:
          type: string
          title: kubernetes_service_account_token
          description: |-
            A Kubernetes service account token used to authenticate to the
             Kubernetes API via Authorization: Bearer and Impersonate-User/Group
             headers.
        kubernetesServiceAccountTokenFile:
          type: string
          title: kubernetes_service_account_token_file
          description: A file containing a Kubernetes service account token.
        kubernetesServiceAccountTokenKeyPairId:
          type:
            - string
            - "null"
          title: kubernetes_service_account_token_key_pair_id
          description: A key pair reference for a Kubernetes service account token.
        enableGoogleCloudServerlessAuthentication:
          type: boolean
          title: enable_google_cloud_serverless_authentication
          description: |-
            Adds an Authorization: Bearer ID_TOKEN header for Google Cloud
             serverless upstream requests.
        jwtIssuerFormat:
          oneOf:
            - $ref: '#/components/schemas/pomerium.config.IssuerFormat'
            - type: "null"
          title: jwt_issuer_format
          description: |-
            Controls the format of the iss claim in JWTs passed to upstream
             services by this route.
        jwtGroupsFilter:
          type: array
          items:
            type: string
          title: jwt_groups_filter
          description: |-
            Allowlist of group names or IDs to include in the Pomerium JWT for
             this route.
        jwtGroupsFilterInferFromPpl:
          type:
            - boolean
            - "null"
          title: jwt_groups_filter_infer_from_ppl
          description: |-
            Whether to add JWT groups from any PPL policies.
             Not supported in the open source version of Pomerium.
        bearerTokenFormat:
          oneOf:
            - $ref: '#/components/schemas/pomerium.config.BearerTokenFormat'
            - type: "null"
          title: bearer_token_format
          description: |-
            Controls how authorization bearer tokens are interpreted for this
             route. When unset, the global bearer_token_format option is used.
        dependsOn:
          type: array
          items:
            type: string
          title: depends_on
          description: |-
            Additional hosts that participate in chained login redirects for
             this route. Up to five hosts are supported.
        policies:
          type: array
          items:
            $ref: '#/components/schemas/pomerium.config.Policy'
          title: policies
          description: Structured sub-policies attached to this route.
        pplPolicies:
          type: array
          items:
            $ref: '#/components/schemas/pomerium.config.PPLPolicy'
          title: ppl_policies
          description: PPL policies attached to this route.
        policyIds:
          type: array
          items:
            type: string
          title: policy_ids
          description: IDs of policies assigned to this route.
        hostRewrite:
          type:
            - string
            - "null"
          title: host_rewrite
          description: Rewrites the Host or :authority header to a fixed value.
        hostRewriteHeader:
          type:
            - string
            - "null"
          title: host_rewrite_header
          description: |-
            Rewrites the Host or :authority header using the value of another
             request header.
        hostPathRegexRewritePattern:
          type:
            - string
            - "null"
          title: host_path_regex_rewrite_pattern
          description: |-
            A regular expression used to rewrite the Host or :authority header
             from the request path.
        hostPathRegexRewriteSubstitution:
          type:
            - string
            - "null"
          title: host_path_regex_rewrite_substitution
          description: |-
            When host_path_regex_rewrite_pattern is set, what the matched
             pattern will be replaced with to produce the Host header.
        idpClientId:
          type:
            - string
            - "null"
          title: idp_client_id
          description: Overrides the global identity provider client ID for this route.
        idpClientSecret:
          type:
            - string
            - "null"
          title: idp_client_secret
          description: Overrides the global identity provider client secret for this route.
        idpAccessTokenAllowedAudiences:
          oneOf:
            - $ref: '#/components/schemas/pomerium.config.Route.StringList'
            - type: "null"
          title: idp_access_token_allowed_audiences
          description: |-
            Allowed audiences for validating IdP-issued access tokens for this
             route.
        showErrorDetails:
          type: boolean
          title: show_error_details
          description: |-
            If true, include policy explanation and remediation details in
             authorization error responses.
        mcp:
          oneOf:
            - $ref: '#/components/schemas/pomerium.config.MCP'
            - type: "null"
          title: mcp
          description: |-
            Model Context Protocol configuration for this route. Requires the
             runtime_flags.mcp feature flag.
        circuitBreakerThresholds:
          oneOf:
            - $ref: '#/components/schemas/pomerium.config.CircuitBreakerThresholds'
            - type: "null"
          title: circuit_breaker_thresholds
          description: Circuit breaker thresholds for upstream requests on this route.
        upstreamTunnel:
          oneOf:
            - $ref: '#/components/schemas/pomerium.config.UpstreamTunnel'
            - type: "null"
          title: upstream_tunnel
          description: Configuration for reverse tunneling to upstreams for this route.
        outlierDetection:
          oneOf:
            - $ref: '#/components/schemas/pomerium.config.OutlierDetection'
            - type: "null"
          title: outlier_detection
          description: |-
            Passive health checking via outlier detection for upstream hosts on
             this route.
        healthChecks:
          type: array
          items:
            $ref: '#/components/schemas/pomerium.config.HealthCheck'
          title: health_checks
          description: Active health checks to run against upstream hosts for this route.
        loadBalancingPolicy:
          oneOf:
            - $ref: '#/components/schemas/pomerium.config.LoadBalancingPolicy'
            - type: "null"
          title: load_balancing_policy
          description: |-
            The load balancing algorithm for upstream endpoints. Options:
             ROUND_ROBIN, RING_HASH, LEAST_REQUEST, RANDOM, MAGLEV.
        healthyPanicThreshold:
          type:
            - integer
            - "null"
          title: healthy_panic_threshold
          format: int32
          description: |-
            If the percentage of healthy upstream hosts drops below this value,
             traffic will be sent to all hosts regardless of health status.
        allowUpgrades:
          oneOf:
            - $ref: '#/components/schemas/pomerium.config.Route.StringList'
            - type: "null"
          title: allow_upgrades
          description: Allows HTTP upgrade requests to be forwarded upstream.
        sessionRecording:
          oneOf:
            - $ref: '#/components/schemas/pomerium.config.SessionRecording'
            - type: "null"
          title: session_recording
          description: |-
            Configures session recording behaviour on this route.
             SSH specific.
        createdAt:
          title: created_at
          description: When the route was created.
          readOnly: true
          $ref: '#/components/schemas/google.protobuf.Timestamp'
        modifiedAt:
          title: modified_at
          description: When the route was last modified.
          readOnly: true
          $ref: '#/components/schemas/google.protobuf.Timestamp'
        enforcedPolicies:
          type: array
          items:
            $ref: '#/components/schemas/pomerium.config.EntityInfo'
          title: enforced_policies
          description: |-
            Policies that are automatically enforced.
             Not supported in the open source version of Pomerium.
          readOnly: true
        assignedPolicies:
          type: array
          items:
            $ref: '#/components/schemas/pomerium.config.EntityInfo'
          title: assigned_policies
          description: |-
            Info about policies assigned to this route.
             Not supported in the open source version of Pomerium.
          readOnly: true
        namespaceName:
          type:
            - string
            - "null"
          title: namespace_name
          description: The name of the namespace for the route.
          readOnly: true
      title: Route
      additionalProperties: false
      description: Configuration for a route.
    pomerium.config.Route.AllowedIdpClaimsEntry:
      type: object
      properties:
        key:
          type: string
          title: key
        value:
          title: value
          $ref: '#/components/schemas/google.protobuf.ListValue'
      title: AllowedIdpClaimsEntry
      additionalProperties: false
    pomerium.config.Route.SetRequestHeadersEntry:
      type: object
      properties:
        key:
          type: string
          title: key
        value:
          type: string
          title: value
      title: SetRequestHeadersEntry
      additionalProperties: false
    pomerium.config.Route.SetResponseHeadersEntry:
      type: object
      properties:
        key:
          type: string
          title: key
        value:
          type: string
          title: value
      title: SetResponseHeadersEntry
      additionalProperties: false
    pomerium.config.Route.StringList:
      type: object
      properties:
        values:
          type: array
          items:
            type: string
          title: values
          description: The string values held by this list.
      title: StringList
      additionalProperties: false
      description: |-
        Wrapper for a list of strings, used so map-valued fields can hold
         repeated string values.
    pomerium.config.RouteDirectResponse:
      type: object
      properties:
        status:
          type: integer
          title: status
          description: |-
            The status code that Pomerium returns for a static HTTP response.
             For example, 200.
        body:
          type: string
          title: body
          description: |-
            The response body that Pomerium returns for a static HTTP
             response.
      title: RouteDirectResponse
      additionalProperties: false
      description: Configuration for a route direct response.
    pomerium.config.RouteRedirect:
      type: object
      properties:
        httpsRedirect:
          type:
            - boolean
            - "null"
          title: https_redirect
          description: |-
            Indicates that the incoming scheme of a request will be swapped with
             "https".
        schemeRedirect:
          type:
            - string
            - "null"
          title: scheme_redirect
          description: |-
            Indicates that the incoming scheme of a request will be swapped with
             the given value.
        hostRedirect:
          type:
            - string
            - "null"
          title: host_redirect
          description: |-
            Indicates that the incoming host of a request will be swapped with
             the given value.
        portRedirect:
          type:
            - integer
            - "null"
          title: port_redirect
          description: |-
            Indicates that the incoming port of a request will be swapped with
             the given value.
        pathRedirect:
          type:
            - string
            - "null"
          title: path_redirect
          description: |-
            Indicates that the incoming path portion of a request URL will be
             swapped with the given value.
        prefixRewrite:
          type:
            - string
            - "null"
          title: prefix_rewrite
          description: |-
            Indicates that the incoming matched path prefix portion of a request
             URL will be swapped with the given value.
        responseCode:
          type:
            - integer
            - "null"
          title: response_code
          format: int32
          description: The response code used for the redirect. Defaults to 301.
        stripQuery:
          type:
            - boolean
            - "null"
          title: strip_query
          description: |-
            Indicates that during redirection, the query portion of the URL will
             be removed. Defaults to false.
      title: RouteRedirect
      additionalProperties: false
      description: Configuration for a route that redirects to a new URL.
    pomerium.config.RouteRewriteHeader:
      type: object
      allOf:
        - properties:
            header:
              type: string
              title: header
              description: The name of the response header to rewrite (case-insensitive).
            value:
              type: string
              title: value
              description: |-
                The new value (or replacement substring, when `prefix` is set) to write
                 back to the header.
        - oneOf:
            - type: object
              properties:
                prefix:
                  type: string
                  title: prefix
                  description: |-
                    Only the portion of the header value that begins with this literal
                     prefix is replaced; the remainder is kept.
              title: prefix
              required:
                - prefix
      title: RouteRewriteHeader
      additionalProperties: false
      description: |-
        A rewrite rule applied to a single response header before the response is
         returned to the downstream client.
    pomerium.config.SANMatcher:
      type: object
      properties:
        sanType:
          title: san_type
          description: Which SAN entry type this pattern applies to.
          $ref: '#/components/schemas/pomerium.config.SANMatcher.SANType'
        pattern:
          type: string
          title: pattern
          description: Regular expression the SAN value must fully match.
      title: SANMatcher
      additionalProperties: false
      description: |-
        SANMatcher describes a constraint against one Subject Alternative Name
         entry in a client certificate.
    pomerium.config.SANMatcher.SANType:
      type: string
      title: SANType
      enum:
        - SAN_TYPE_UNSPECIFIED
        - EMAIL
        - DNS
        - URI
        - IP_ADDRESS
        - USER_PRINCIPAL_NAME
      description: Represents a certificate Subject Alternative Name type.
    pomerium.config.ServerType:
      type: string
      title: ServerType
      enum:
        - SERVER_TYPE_UNKNOWN
        - SERVER_TYPE_CORE
        - SERVER_TYPE_ENTERPRISE
        - SERVER_TYPE_ZERO
      description: Which Pomerium build is serving the request.
    pomerium.config.ServiceAccount:
      type: object
      properties:
        id:
          type:
            - string
            - "null"
          title: id
          description: ID of the service account.
        namespaceId:
          type:
            - string
            - "null"
          title: namespace_id
          description: Namespace of the service account.
        originatorId:
          type:
            - string
            - "null"
          title: originator_id
          description: Originator of the service account.
        description:
          type:
            - string
            - "null"
          title: description
          description: Description of the service account.
        userId:
          type:
            - string
            - "null"
          title: user_id
          description: User ID of the service account.
        expiresAt:
          oneOf:
            - $ref: '#/components/schemas/google.protobuf.Timestamp'
            - type: "null"
          title: expires_at
          description: When the service account expires.
        createdAt:
          title: created_at
          description: When the service account was created.
          $ref: '#/components/schemas/google.protobuf.Timestamp'
        modifiedAt:
          title: modified_at
          description: When the service account was last modified.
          $ref: '#/components/schemas/google.protobuf.Timestamp'
        accessedAt:
          title: accessed_at
          description: When the service account was last accessed.
          $ref: '#/components/schemas/google.protobuf.Timestamp'
      title: ServiceAccount
      additionalProperties: false
      description: A ServiceAccount represents a Pomerium service account.
    pomerium.config.SessionRecording:
      type: object
      properties:
        enabled:
          type: boolean
          title: enabled
          description: Toggle to enable/disable recording for this route.
      title: SessionRecording
      additionalProperties: false
      description: SessionRecording defines session recording settings for routes.
    pomerium.config.Settings:
      type: object
      properties:
        id:
          type:
            - string
            - "null"
          title: id
          description: Server-assigned unique ID of the Settings record.
        namespaceId:
          type:
            - string
            - "null"
          title: namespace_id
          description: ID of the namespace the Settings record belongs to.
        clusterId:
          type:
            - string
            - "null"
          title: cluster_id
          description: ID of the cluster the Settings record applies to.
        originatorId:
          type:
            - string
            - "null"
          title: originator_id
          description: ID of the upstream object the record originated from, when imported.
        name:
          type:
            - string
            - "null"
          title: name
          description: Human-readable name of the Settings record.
        installationId:
          type:
            - string
            - "null"
          title: installation_id
          description: |-
            Stable identifier for this installation, used in telemetry and
             diagnostics. Generated at first start when unset.
        logLevel:
          type:
            - string
            - "null"
          title: log_level
          description: |-
            Global log level for Pomerium services ("debug", "info", "warn",
             "error"). Empty falls back to "info".
        accessLogFields:
          oneOf:
            - $ref: '#/components/schemas/pomerium.config.Settings.StringList'
            - type: "null"
          title: access_log_fields
          description: |-
            Subset of access-log fields to emit. Use
             ListAvailableLogFields.available_access_log_fields to see what's valid;
             unset means the service default.
        authorizeLogFields:
          oneOf:
            - $ref: '#/components/schemas/pomerium.config.Settings.StringList'
            - type: "null"
          title: authorize_log_fields
          description: Subset of authorize-log fields to emit; see ListAvailableLogFields.
        proxyLogLevel:
          type:
            - string
            - "null"
          title: proxy_log_level
          description: Log level for the proxy service in particular, overriding `log_level`.
        sharedSecret:
          type:
            - string
            - "null"
          title: shared_secret
          description: |-
            Cluster-wide shared secret used to sign and validate internal requests
             and JWTs across Pomerium services. Must be a base64-encoded 32-byte
             value.
        services:
          type:
            - string
            - "null"
          title: services
          description: |-
            Comma-separated list of Pomerium services to run in this process
             ("all", "authenticate", "authorize", "databroker", "proxy").
        address:
          type:
            - string
            - "null"
          title: address
          description: IP address and port for serving HTTPS requests (e.g. ":443").
        insecureServer:
          type:
            - boolean
            - "null"
          title: insecure_server
          description: |-
            When true, Pomerium serves HTTP without TLS. Intended only for testing
             behind a TLS-terminating load balancer.
        dnsFailureRefreshRate:
          oneOf:
            - $ref: '#/components/schemas/google.protobuf.Duration'
            - type: "null"
          title: dns_failure_refresh_rate
          description: How long Envoy waits before retrying a failed DNS resolution.
        dnsLookupFamily:
          type:
            - string
            - "null"
          title: dns_lookup_family
          description: |-
            Envoy DNS lookup family ("AUTO", "V4_ONLY", "V6_ONLY", "V4_PREFERRED",
             "ALL"). Controls which address families Envoy resolves.
        dnsQueryTimeout:
          oneOf:
            - $ref: '#/components/schemas/google.protobuf.Duration'
            - type: "null"
          title: dns_query_timeout
          description: Maximum time Envoy waits for a single DNS query to return.
        dnsQueryTries:
          type:
            - integer
            - "null"
          title: dns_query_tries
          description: Number of times Envoy retries a failed DNS query before giving up.
        dnsRefreshRate:
          oneOf:
            - $ref: '#/components/schemas/google.protobuf.Duration'
            - type: "null"
          title: dns_refresh_rate
          description: How often Envoy refreshes resolved addresses regardless of TTL.
        dnsUdpMaxQueries:
          type:
            - integer
            - "null"
          title: dns_udp_max_queries
          description: |-
            Maximum number of in-flight DNS queries Envoy will multiplex over a
             single UDP socket.
        dnsUseTcp:
          type:
            - boolean
            - "null"
          title: dns_use_tcp
          description: When true, Envoy resolves DNS over TCP instead of UDP.
        certificates:
          type: array
          items:
            $ref: '#/components/schemas/pomerium.config.Settings.Certificate'
          title: certificates
          description: |-
            Inline TLS certificate/key pairs Pomerium serves. Each entry is matched
             against the request's SNI hostname.
        certificateKeyPairIds:
          type: array
          items:
            type: string
          title: certificate_key_pair_ids
          description: |-
            IDs of managed key pairs to serve as TLS certificates, as an alternative
             to inline `certificates` entries.
        httpRedirectAddr:
          type:
            - string
            - "null"
          title: http_redirect_addr
          description: |-
            Address (host:port) on which Pomerium listens for plaintext HTTP and
             issues a redirect to the HTTPS address. Empty disables the redirect
             listener.
        timeoutRead:
          oneOf:
            - $ref: '#/components/schemas/google.protobuf.Duration'
            - type: "null"
          title: timeout_read
          description: |-
            Maximum time the proxy will wait for a complete request from a
             downstream client.
        timeoutWrite:
          oneOf:
            - $ref: '#/components/schemas/google.protobuf.Duration'
            - type: "null"
          title: timeout_write
          description: |-
            Maximum time the proxy will wait to send a complete response to a
             downstream client.
        timeoutIdle:
          oneOf:
            - $ref: '#/components/schemas/google.protobuf.Duration'
            - type: "null"
          title: timeout_idle
          description: Maximum idle time on a kept-alive connection before it is closed.
        authenticateServiceUrl:
          type:
            - string
            - "null"
          title: authenticate_service_url
          description: Externally accessible URL for the authenticate service.
        authenticateInternalServiceUrl:
          type:
            - string
            - "null"
          title: authenticate_internal_service_url
          description: |-
            URL Pomerium uses internally to reach the authenticate service. Set
             when the externally visible URL goes through a load balancer that
             proxies cannot reuse.
        signoutRedirectUrl:
          type:
            - string
            - "null"
          title: signout_redirect_url
          description: URL to redirect users to after they sign out.
        cookieName:
          type:
            - string
            - "null"
          title: cookie_name
          description: Name of the session cookie Pomerium issues. Defaults to "_pomerium".
        cookieSecret:
          type:
            - string
            - "null"
          title: cookie_secret
          description: |-
            Secret used to encrypt and sign session cookies. Must be a
             base64-encoded 32-byte value.
        cookieDomain:
          type:
            - string
            - "null"
          title: cookie_domain
          description: |-
            Domain set on the session cookie. Pomerium defaults to the
             authenticate service URL host.
        cookieHttpOnly:
          type:
            - boolean
            - "null"
          title: cookie_http_only
          description: When true the session cookie carries the HttpOnly attribute.
        cookieExpire:
          oneOf:
            - $ref: '#/components/schemas/google.protobuf.Duration'
            - type: "null"
          title: cookie_expire
          description: How long an issued session cookie remains valid.
        cookieSameSite:
          type:
            - string
            - "null"
          title: cookie_same_site
          description: SameSite attribute of the session cookie ("strict", "lax", "none").
        idpClientId:
          type:
            - string
            - "null"
          title: idp_client_id
          description: OAuth2 client ID for the identity provider.
        idpClientSecret:
          type:
            - string
            - "null"
          title: idp_client_secret
          description: OAuth2 client secret for the identity provider.
        idpProvider:
          type:
            - string
            - "null"
          title: idp_provider
          description: |-
            Identity provider name ("oidc", "okta", "auth0", "google", "azure", …).
             Selects which IdP integration Pomerium uses.
        idpProviderUrl:
          type:
            - string
            - "null"
          title: idp_provider_url
          description: OIDC issuer URL of the identity provider.
        idpAccessTokenAllowedAudiences:
          oneOf:
            - $ref: '#/components/schemas/pomerium.config.Settings.StringList'
            - type: "null"
          title: idp_access_token_allowed_audiences
          description: |-
            Audiences Pomerium accepts on IdP-issued access tokens. Required when
             BEARER_TOKEN_FORMAT_IDP_ACCESS_TOKEN routes exist.
        scopes:
          type: array
          items:
            type: string
          title: scopes
          description: OIDC scopes Pomerium requests when authenticating users.
        requestParams:
          type: object
          title: request_params
          additionalProperties:
            type: string
            title: value
          description: |-
            Additional query parameters Pomerium appends to the IdP authorization
             request.
        authorizeServiceUrls:
          type: array
          items:
            type: string
          title: authorize_service_urls
          description: Externally accessible URLs for the authorize service.
        authorizeInternalServiceUrl:
          type:
            - string
            - "null"
          title: authorize_internal_service_url
          description: URL Pomerium uses internally to reach the authorize service.
        overrideCertificateName:
          type:
            - string
            - "null"
          title: override_certificate_name
          description: |-
            Hostname Pomerium expects in upstream TLS certificates. Useful when
             upstream addresses are IPs but the certificate contains a hostname SAN.
        certificateAuthority:
          type:
            - string
            - "null"
          title: certificate_authority
          description: |-
            PEM-encoded certificate authority bundle Pomerium trusts for upstream
             TLS verification.
        certificateAuthorityKeyPairId:
          type:
            - string
            - "null"
          title: certificate_authority_key_pair_id
          description: |-
            ID of a managed key pair whose certificate is used as the upstream CA
             bundle, as an alternative to the inline `certificate_authority` value.
        deriveTls:
          type:
            - string
            - "null"
          title: derive_tls
          description: |-
            Base hostname Pomerium uses to derive default TLS certificates for
             routes. Empty disables derivation.
        signingKey:
          type:
            - string
            - "null"
          title: signing_key
          description: |-
            Private key Pomerium uses to sign internally issued JWTs (e.g. the JWT
             attached to upstream requests). Must be a PEM-encoded key.
        setResponseHeaders:
          type: object
          title: set_response_headers
          additionalProperties:
            type: string
            title: value
          description: Headers Pomerium sets on every response across all routes.
        jwtClaimsHeaders:
          type: object
          title: jwt_claims_headers
          additionalProperties:
            type: string
            title: value
          description: |-
            Map of header name to JWT claim. Pomerium copies the claim value from
             the session JWT to the named header on upstream requests.
        jwtIssuerFormat:
          oneOf:
            - $ref: '#/components/schemas/pomerium.config.IssuerFormat'
            - type: "null"
          title: jwt_issuer_format
          description: |-
            Format of the `iss` claim in JWTs Pomerium issues for upstream
             requests.
        jwtGroupsFilter:
          type: array
          items:
            type: string
          title: jwt_groups_filter
          description: |-
            Allowlist of group IDs/names; the JWT Pomerium issues includes only
             groups appearing here. Empty means include all.
        jwtGroupsFilterInferFromPpl:
          type:
            - boolean
            - "null"
          title: jwt_groups_filter_infer_from_ppl
          description: |-
            When true the effective `jwt_groups_filter` is augmented with groups
             referenced by route PPL policies.
        bearerTokenFormat:
          oneOf:
            - $ref: '#/components/schemas/pomerium.config.BearerTokenFormat'
            - type: "null"
          title: bearer_token_format
          description: |-
            Cluster-wide default for how to interpret HTTP bearer tokens. Routes
             may override per-route.
        defaultUpstreamTimeout:
          oneOf:
            - $ref: '#/components/schemas/google.protobuf.Duration'
            - type: "null"
          title: default_upstream_timeout
          description: |-
            Default per-request timeout applied to upstream HTTP requests when a
             route does not specify its own.
        debugAddress:
          type:
            - string
            - "null"
          title: debug_address
          description: |-
            Address (host:port) on which Pomerium exposes its pprof debug
             endpoints. Empty disables them.
        metricsAddress:
          type:
            - string
            - "null"
          title: metrics_address
          description: Address (host:port) on which Pomerium serves Prometheus metrics.
        metricsBasicAuth:
          type:
            - string
            - "null"
          title: metrics_basic_auth
          description: |-
            HTTP Basic Auth credentials required to access `metrics_address`, of
             the form "user:password". Empty disables auth.
        metricsCertificate:
          oneOf:
            - $ref: '#/components/schemas/pomerium.config.Settings.Certificate'
            - type: "null"
          title: metrics_certificate
          description: TLS certificate/key pair Pomerium uses on the metrics listener.
        metricsClientCa:
          type:
            - string
            - "null"
          title: metrics_client_ca
          description: |-
            PEM-encoded CA bundle used to authenticate clients connecting to the
             metrics listener.
        metricsClientCaKeyPairId:
          type:
            - string
            - "null"
          title: metrics_client_ca_key_pair_id
          description: |-
            ID of a managed key pair whose certificate is used as the metrics
             client CA bundle, as an alternative to `metrics_client_ca`.
        otelTracesExporter:
          type:
            - string
            - "null"
          title: otel_traces_exporter
          description: |-
            Which OpenTelemetry traces exporter to use ("otlp", "none", …). Empty
             disables tracing.
        otelTracesSamplerArg:
          type:
            - number
            - "null"
          title: otel_traces_sampler_arg
          format: double
          description: |-
            OpenTelemetry sampler argument. For ratio-based samplers this is the
             sampling probability (0.0–1.0).
        otelResourceAttributes:
          type: array
          items:
            type: string
          title: otel_resource_attributes
          description: |-
            OpenTelemetry resource attributes appended to every emitted span/log,
             as "key=value" strings.
        otelLogLevel:
          type:
            - string
            - "null"
          title: otel_log_level
          description: Log level for the OpenTelemetry SDK itself.
        otelAttributeValueLengthLimit:
          type:
            - integer
            - "null"
          title: otel_attribute_value_length_limit
          format: int32
          description: |-
            Maximum length of a single OpenTelemetry attribute value before it is
             truncated.
        otelExporterOtlpEndpoint:
          type:
            - string
            - "null"
          title: otel_exporter_otlp_endpoint
          description: |-
            Default OTLP endpoint Pomerium dials for any OTLP exporter (traces,
             logs) when no signal-specific endpoint is set.
        otelExporterOtlpTracesEndpoint:
          type:
            - string
            - "null"
          title: otel_exporter_otlp_traces_endpoint
          description: |-
            OTLP endpoint specifically for traces; overrides
             `otel_exporter_otlp_endpoint` for the trace signal.
        otelExporterOtlpProtocol:
          type:
            - string
            - "null"
          title: otel_exporter_otlp_protocol
          description: OTLP transport protocol ("grpc" or "http/protobuf").
        otelExporterOtlpTracesProtocol:
          type:
            - string
            - "null"
          title: otel_exporter_otlp_traces_protocol
          description: OTLP transport protocol used specifically for traces.
        otelExporterOtlpHeaders:
          type: array
          items:
            type: string
          title: otel_exporter_otlp_headers
          description: |-
            Headers attached to every OTLP request, as "key=value" strings (e.g.
             for tenant identification).
        otelExporterOtlpTracesHeaders:
          type: array
          items:
            type: string
          title: otel_exporter_otlp_traces_headers
          description: OTLP headers used specifically for traces.
        otelExporterOtlpTimeout:
          oneOf:
            - $ref: '#/components/schemas/google.protobuf.Duration'
            - type: "null"
          title: otel_exporter_otlp_timeout
          description: Per-request timeout for the OTLP exporter.
        otelExporterOtlpTracesTimeout:
          oneOf:
            - $ref: '#/components/schemas/google.protobuf.Duration'
            - type: "null"
          title: otel_exporter_otlp_traces_timeout
          description: Per-request timeout used specifically for the OTLP traces exporter.
        otelBspScheduleDelay:
          oneOf:
            - $ref: '#/components/schemas/google.protobuf.Duration'
            - type: "null"
          title: otel_bsp_schedule_delay
          description: |-
            Delay between scheduled batches of spans the BatchSpanProcessor
             exports.
        otelBspMaxExportBatchSize:
          type:
            - integer
            - "null"
          title: otel_bsp_max_export_batch_size
          format: int32
          description: Maximum number of spans per export batch.
        grpcAddress:
          type:
            - string
            - "null"
          title: grpc_address
          description: Address (host:port) on which Pomerium serves its gRPC API.
        grpcInsecure:
          type:
            - boolean
            - "null"
          title: grpc_insecure
          description: |-
            When true, Pomerium speaks plaintext gRPC instead of TLS. Intended for
             co-located service deployments behind a trusted network boundary.
        grpcClientTimeout:
          oneOf:
            - $ref: '#/components/schemas/google.protobuf.Duration'
            - type: "null"
          title: grpc_client_timeout
          description: |-
            Per-request timeout applied to gRPC client calls Pomerium makes to its
             own services (authorize, databroker).
        databrokerClusterLeaderId:
          type:
            - string
            - "null"
          title: databroker_cluster_leader_id
          description: Node ID of the databroker Raft leader, as observed by this process.
        databrokerClusterNodeId:
          type:
            - string
            - "null"
          title: databroker_cluster_node_id
          description: |-
            Node ID this process uses when participating in the databroker
             cluster.
        databrokerClusterNodes:
          oneOf:
            - $ref: '#/components/schemas/pomerium.config.Settings.DataBrokerClusterNodes'
            - type: "null"
          title: databroker_cluster_nodes
          description: Full membership list of the databroker cluster.
        databrokerServiceUrls:
          type: array
          items:
            type: string
          title: databroker_service_urls
          description: Externally accessible URLs for the databroker service.
        databrokerInternalServiceUrl:
          type:
            - string
            - "null"
          title: databroker_internal_service_url
          description: URL Pomerium uses internally to reach the databroker service.
        databrokerRaftBindAddress:
          type:
            - string
            - "null"
          title: databroker_raft_bind_address
          description: Bind address (host:port) for this node's Raft transport.
        databrokerStorageType:
          type:
            - string
            - "null"
          title: databroker_storage_type
          description: Backing-store type for the databroker ("memory", "postgres", …).
        databrokerStorageConnectionString:
          type:
            - string
            - "null"
          title: databroker_storage_connection_string
          description: Connection string for the databroker storage backend, when applicable.
        downstreamMtls:
          oneOf:
            - $ref: '#/components/schemas/pomerium.config.DownstreamMtlsSettings'
            - type: "null"
          title: downstream_mtls
          description: Downstream (end-user) mTLS validation configuration.
        googleCloudServerlessAuthenticationServiceAccount:
          type:
            - string
            - "null"
          title: google_cloud_serverless_authentication_service_account
          description: |-
            Google Cloud service account email Pomerium uses to obtain ID tokens
             for Cloud Run / serverless upstream targets.
        useProxyProtocol:
          type:
            - boolean
            - "null"
          title: use_proxy_protocol
          description: |-
            When true, Pomerium expects downstream connections to begin with the
             HAProxy PROXY protocol header (v1 or v2).
        autocert:
          type:
            - boolean
            - "null"
          title: autocert
          description: |-
            When true, Pomerium uses ACME to automatically obtain and renew TLS
             certificates for the configured route hostnames.
        autocertCa:
          type:
            - string
            - "null"
          title: autocert_ca
          description: Directory URL of the ACME CA to use when `autocert` is enabled.
        autocertCaKeyPairId:
          type:
            - string
            - "null"
          title: autocert_ca_key_pair_id
          description: |-
            ID of a managed key pair whose certificate Pomerium presents to the
             ACME CA for account binding.
        autocertEmail:
          type:
            - string
            - "null"
          title: autocert_email
          description: |-
            Email address Pomerium registers with the ACME CA. Required by most
             CAs for expiration notifications.
        autocertUseStaging:
          type:
            - boolean
            - "null"
          title: autocert_use_staging
          description: |-
            When true, Pomerium uses Let's Encrypt's staging environment. Useful
             for testing to avoid hitting rate limits.
        autocertEabKeyId:
          type:
            - string
            - "null"
          title: autocert_eab_key_id
          description: External Account Binding key identifier provided by the ACME CA.
        autocertEabMacKey:
          type:
            - string
            - "null"
          title: autocert_eab_mac_key
          description: Base64-URL-encoded EAB MAC key paired with `autocert_eab_key_id`.
        autocertMustStaple:
          type:
            - boolean
            - "null"
          title: autocert_must_staple
          description: |-
            When true, Pomerium requests certificates with the OCSP Must-Staple
             extension.
        autocertDir:
          type:
            - string
            - "null"
          title: autocert_dir
          description: |-
            Filesystem directory Pomerium uses to cache obtained certificates and
             ACME account state.
        autocertTrustedCa:
          type:
            - string
            - "null"
          title: autocert_trusted_ca
          description: |-
            PEM-encoded CA bundle Pomerium trusts when validating the ACME CA's
             own TLS certificate, for private ACME servers.
        autocertTrustedCaKeyPairId:
          type:
            - string
            - "null"
          title: autocert_trusted_ca_key_pair_id
          description: |-
            ID of a managed key pair whose certificate is used as the trusted CA
             for the ACME server, as an alternative to `autocert_trusted_ca`.
        skipXffAppend:
          type:
            - boolean
            - "null"
          title: skip_xff_append
          description: |-
            When true, Pomerium does not append the immediate client IP to the
             X-Forwarded-For header on upstream requests.
        xffNumTrustedHops:
          type:
            - integer
            - "null"
          title: xff_num_trusted_hops
          description: |-
            Number of trusted hops Pomerium considers when extracting the
             client IP from the X-Forwarded-For header.
        envoyAdminAccessLogPath:
          type:
            - string
            - "null"
          title: envoy_admin_access_log_path
          description: |-
            Path to which Envoy writes admin-interface access logs. Empty
             disables admin-access logging.
        envoyAdminProfilePath:
          type:
            - string
            - "null"
          title: envoy_admin_profile_path
          description: |-
            Path to which Envoy writes pprof profiles when requested via the
             admin interface.
        envoyAdminAddress:
          type:
            - string
            - "null"
          title: envoy_admin_address
          description: |-
            Address (host:port) on which Envoy exposes its admin interface.
             Empty disables the admin interface.
        envoyBindConfigSourceAddress:
          type:
            - string
            - "null"
          title: envoy_bind_config_source_address
          description: Source address Envoy binds when connecting to upstreams.
        envoyBindConfigFreebind:
          type:
            - boolean
            - "null"
          title: envoy_bind_config_freebind
          description: |-
            When true, Envoy's upstream connections set IP_FREEBIND, allowing
             binding to non-local addresses.
        programmaticRedirectDomainWhitelist:
          type: array
          items:
            type: string
          title: programmatic_redirect_domain_whitelist
          description: Hostnames Pomerium allows in programmatic-login redirect URLs.
        codecType:
          oneOf:
            - $ref: '#/components/schemas/pomerium.config.CodecType'
            - type: "null"
          title: codec_type
          description: Default HTTP codec used for downstream connections.
        primaryColor:
          type:
            - string
            - "null"
          title: primary_color
          description: |-
            Primary brand color (hex string like "#1e88e5") used in the
             Pomerium-served sign-in and error pages.
        secondaryColor:
          type:
            - string
            - "null"
          title: secondary_color
          description: Secondary brand color (hex string).
        darkmodePrimaryColor:
          type:
            - string
            - "null"
          title: darkmode_primary_color
          description: Primary brand color used in dark mode.
        darkmodeSecondaryColor:
          type:
            - string
            - "null"
          title: darkmode_secondary_color
          description: Secondary brand color used in dark mode.
        logoUrl:
          type:
            - string
            - "null"
          title: logo_url
          description: URL of the logo image displayed on Pomerium-served pages.
        faviconUrl:
          type:
            - string
            - "null"
          title: favicon_url
          description: URL of the favicon used on Pomerium-served pages.
        errorMessageFirstParagraph:
          type:
            - string
            - "null"
          title: error_message_first_paragraph
          description: |-
            First paragraph of the error message Pomerium shows on access denied
             pages, before the auto-generated diagnostic text.
        passIdentityHeaders:
          type:
            - boolean
            - "null"
          title: pass_identity_headers
          description: |-
            When true, Pomerium adds X-Pomerium-* identity headers to upstream
             requests in addition to the signed JWT.
        runtimeFlags:
          type: object
          title: runtime_flags
          additionalProperties:
            type: boolean
            title: value
          description: |-
            Per-flag boolean overrides for Pomerium runtime feature gates. The
             set of supported keys evolves with the release.
        http3AdvertisePort:
          type:
            - integer
            - "null"
          title: http3_advertise_port
          description: |-
            Port advertised in the Alt-Svc header so clients can upgrade to HTTP/3
             (QUIC). Zero disables advertisement.
        circuitBreakerThresholds:
          oneOf:
            - $ref: '#/components/schemas/pomerium.config.CircuitBreakerThresholds'
            - type: "null"
          title: circuit_breaker_thresholds
          description: |-
            Default upstream circuit-breaker thresholds applied to all routes
             unless overridden per route.
        sshAddress:
          type:
            - string
            - "null"
          title: ssh_address
          description: |-
            Address (host:port) on which Pomerium listens for SSH traffic.
             Empty disables the SSH proxy.
        sshHostKeyFiles:
          oneOf:
            - $ref: '#/components/schemas/pomerium.config.Settings.StringList'
            - type: "null"
          title: ssh_host_key_files
          description: |-
            Paths to host-key files Pomerium reads at startup to authenticate
             itself to SSH clients.
        sshHostKeys:
          oneOf:
            - $ref: '#/components/schemas/pomerium.config.Settings.StringList'
            - type: "null"
          title: ssh_host_keys
          description: Inline SSH host keys, used in place of `ssh_host_key_files`.
        sshHostKeyPairIds:
          type: array
          items:
            type: string
          title: ssh_host_key_pair_ids
          description: |-
            IDs of managed key pairs to use as SSH host keys, as an alternative
             to file or inline values.
        sshUserCaKeyFile:
          type:
            - string
            - "null"
          title: ssh_user_ca_key_file
          description: |-
            Path to a file containing the SSH user-CA private key Pomerium uses
             to issue short-lived SSH user certificates.
        sshUserCaKey:
          type:
            - string
            - "null"
          title: ssh_user_ca_key
          description: |-
            Inline SSH user-CA private key, used in place of
             `ssh_user_ca_key_file`.
        sshUserCaKeyPairId:
          type:
            - string
            - "null"
          title: ssh_user_ca_key_pair_id
          description: |-
            ID of a managed key pair to use as the SSH user-CA key, as an
             alternative to file or inline values.
        mcpAllowedClientIdDomains:
          type: array
          items:
            type: string
          title: mcp_allowed_client_id_domains
          description: |-
            mcp_allowed_client_id_domains specifies the allowed domains for MCP client ID metadata URLs.
             Supports wildcard patterns like "*.example.com".
             This is REQUIRED when MCP is enabled - client metadata fetching will fail if empty.
        mcpAllowedAsMetadataDomains:
          type: array
          items:
            type: string
          title: mcp_allowed_as_metadata_domains
          description: |-
            mcp_allowed_as_metadata_domains specifies the allowed domains for upstream AS/PRM metadata URLs.
             Supports wildcard patterns like "*.example.com".
             This restricts which domains Pomerium will contact during upstream OAuth discovery.
        directoryProvider:
          type:
            - string
            - "null"
          title: directory_provider
          description: |-
            Directory-sync provider Pomerium uses to enumerate users and groups
             ("auth0", "okta", "azure", …). Empty disables directory sync.
        directoryProviderOptions:
          oneOf:
            - $ref: '#/components/schemas/google.protobuf.Struct'
            - type: "null"
          title: directory_provider_options
          description: |-
            Provider-specific options for the directory provider, as a generic
             JSON object.
        directoryProviderRefreshInterval:
          oneOf:
            - $ref: '#/components/schemas/google.protobuf.Duration'
            - type: "null"
          title: directory_provider_refresh_interval
          description: How often Pomerium refreshes the directory cache.
        directoryProviderRefreshTimeout:
          oneOf:
            - $ref: '#/components/schemas/google.protobuf.Duration'
            - type: "null"
          title: directory_provider_refresh_timeout
          description: Per-attempt timeout for a single directory refresh cycle.
        blobStorage:
          oneOf:
            - $ref: '#/components/schemas/pomerium.config.BlobStorageSettings'
            - type: "null"
          title: blob_storage
          description: |-
            Object-storage backend Pomerium uses for large artifacts (session
             recordings, exports). Empty disables blob storage.
        autoApplyChangesets:
          type:
            - boolean
            - "null"
          title: auto_apply_changesets
          description: |-
            auto_apply_changesets controls whether or not changesets are automatically
             applied or require an adminstrator to apply them. This setting is
             currently only used in Pomerium Zero.
        allowUpgrades:
          oneOf:
            - $ref: '#/components/schemas/pomerium.config.Settings.StringList'
            - type: "null"
          title: allow_upgrades
          description: Allows HTTP upgrade requests to be forwarded upstream.
        envoyDynamicExtensions:
          title: envoy_dynamic_extensions
          description: File paths to the extensions to be loaded by envoy at runtime.
          $ref: '#/components/schemas/pomerium.config.Settings.StringList'
        sessionRecordingConcurrency:
          type:
            - integer
            - "null"
          title: session_recording_concurrency
          description: |-
            Tunes the maximum number of worker threads that envoy allocates for session recording
             uploading
        normalizePath:
          type:
            - boolean
            - "null"
          title: normalize_path
          description: |-
            Should paths be normalized according to RFC 3986 before any processing of
             requests by HTTP filters or routing? Defaults to true.
        mergeSlashes:
          type:
            - boolean
            - "null"
          title: merge_slashes
          description: |-
            Determines if adjacent slashes in the path are merged into one before any
             processing of requests by HTTP filters or routing. Defaults to true.
        pathWithEscapedSlashesAction:
          oneOf:
            - $ref: '#/components/schemas/pomerium.config.PathWithEscapedSlashesAction'
            - type: "null"
          title: path_with_escaped_slashes_action
          description: |-
            Action to take when request URL path contains escaped slash sequences
             (%2F, %2f, %5C and %5c). Defaults to rejecting requests.
        headersWithUnderscoresAction:
          oneOf:
            - $ref: '#/components/schemas/pomerium.config.HeadersWithUnderscoresAction'
            - type: "null"
          title: headers_with_underscores_action
          description: |-
            Action to take when a client request with a header name containing
             underscore characters is received. Defaults to rejecting the request.
        createdAt:
          title: created_at
          description: When the settings were created.
          readOnly: true
          $ref: '#/components/schemas/google.protobuf.Timestamp'
        modifiedAt:
          title: modified_at
          description: When the settings were last modified.
          readOnly: true
          $ref: '#/components/schemas/google.protobuf.Timestamp'
      title: Settings
      additionalProperties: false
      description: Global Pomerium configuration settings.
    pomerium.config.Settings.Certificate:
      type: object
      properties:
        certBytes:
          type: string
          title: cert_bytes
          format: byte
          description: PEM-encoded certificate chain.
        keyBytes:
          type: string
          title: key_bytes
          format: byte
          description: PEM-encoded private key matching `cert_bytes`.
        id:
          type: string
          title: id
          description: |-
            Optional identifier for the certificate, used to refer to it from
             other parts of the configuration.
      title: Certificate
      additionalProperties: false
      description: |-
        An inline TLS certificate/key pair Pomerium serves for matching SNI
         hostnames.
    pomerium.config.Settings.DataBrokerClusterNode:
      type: object
      properties:
        id:
          type: string
          title: id
          description: Stable identifier of the node within the cluster.
        grpcAddress:
          type: string
          title: grpc_address
          description: |-
            gRPC service address (host:port) other components dial to reach this
             databroker node.
        raftAddress:
          type:
            - string
            - "null"
          title: raft_address
          description: Raft transport address (host:port) used for peer-to-peer replication.
      title: DataBrokerClusterNode
      additionalProperties: false
      description: One peer in a Pomerium databroker Raft cluster.
    pomerium.config.Settings.DataBrokerClusterNodes:
      type: object
      properties:
        nodes:
          type: array
          items:
            $ref: '#/components/schemas/pomerium.config.Settings.DataBrokerClusterNode'
          title: nodes
          description: Every node participating in the databroker cluster.
      title: DataBrokerClusterNodes
      additionalProperties: false
      description: Aggregate list of databroker cluster peers.
    pomerium.config.Settings.JwtClaimsHeadersEntry:
      type: object
      properties:
        key:
          type: string
          title: key
        value:
          type: string
          title: value
      title: JwtClaimsHeadersEntry
      additionalProperties: false
    pomerium.config.Settings.RequestParamsEntry:
      type: object
      properties:
        key:
          type: string
          title: key
        value:
          type: string
          title: value
      title: RequestParamsEntry
      additionalProperties: false
    pomerium.config.Settings.RuntimeFlagsEntry:
      type: object
      properties:
        key:
          type: string
          title: key
        value:
          type: boolean
          title: value
      title: RuntimeFlagsEntry
      additionalProperties: false
    pomerium.config.Settings.SetResponseHeadersEntry:
      type: object
      properties:
        key:
          type: string
          title: key
        value:
          type: string
          title: value
      title: SetResponseHeadersEntry
      additionalProperties: false
    pomerium.config.Settings.StringList:
      type: object
      properties:
        values:
          type: array
          items:
            type: string
          title: values
          description: The string values held by this list.
      title: StringList
      additionalProperties: false
      description: |-
        Wrapper for a list of strings, used so map-valued Settings fields can
         hold repeated string values.
    pomerium.config.UpdateKeyPairRequest:
      type: object
      properties:
        keyPair:
          title: key_pair
          description: |-
            Updated key pair. The KeyPair's `id` selects which record to update; any
             sensitive fields not present are preserved from the existing record.
          $ref: '#/components/schemas/pomerium.config.KeyPair'
        updateMask:
          oneOf:
            - $ref: '#/components/schemas/google.protobuf.FieldMask'
            - type: "null"
          title: update_mask
          description: Optional update_mask to only update a subset of the fields.
      title: UpdateKeyPairRequest
      additionalProperties: false
    pomerium.config.UpdateKeyPairResponse:
      type: object
      properties:
        keyPair:
          title: key_pair
          description: The updated key pair, including any server-modified fields.
          $ref: '#/components/schemas/pomerium.config.KeyPair'
      title: UpdateKeyPairResponse
      additionalProperties: false
    pomerium.config.UpdatePolicyRequest:
      type: object
      properties:
        policy:
          title: policy
          description: Updated policy. The Policy's `id` selects which record to update.
          $ref: '#/components/schemas/pomerium.config.Policy'
        updateMask:
          oneOf:
            - $ref: '#/components/schemas/google.protobuf.FieldMask'
            - type: "null"
          title: update_mask
          description: Optional update_mask to only update a subset of the fields.
      title: UpdatePolicyRequest
      additionalProperties: false
    pomerium.config.UpdatePolicyResponse:
      type: object
      properties:
        policy:
          title: policy
          description: The updated policy, including any server-modified fields.
          $ref: '#/components/schemas/pomerium.config.Policy'
      title: UpdatePolicyResponse
      additionalProperties: false
    pomerium.config.UpdateRouteRequest:
      type: object
      properties:
        route:
          title: route
          description: |-
            Updated route. The Route's `id` selects which record to update; any
             sensitive fields not present are preserved from the existing record.
          $ref: '#/components/schemas/pomerium.config.Route'
        updateMask:
          oneOf:
            - $ref: '#/components/schemas/google.protobuf.FieldMask'
            - type: "null"
          title: update_mask
          description: Optional update_mask to only update a subset of the fields.
      title: UpdateRouteRequest
      additionalProperties: false
    pomerium.config.UpdateRouteResponse:
      type: object
      properties:
        route:
          title: route
          description: The updated route, including any server-modified fields.
          $ref: '#/components/schemas/pomerium.config.Route'
      title: UpdateRouteResponse
      additionalProperties: false
    pomerium.config.UpdateServiceAccountRequest:
      type: object
      properties:
        serviceAccount:
          title: service_account
          description: |-
            Updated service account. The ServiceAccount's `id` selects which record
             to update.
          $ref: '#/components/schemas/pomerium.config.ServiceAccount'
        updateMask:
          oneOf:
            - $ref: '#/components/schemas/google.protobuf.FieldMask'
            - type: "null"
          title: update_mask
          description: Optional update_mask to only update a subset of the fields.
      title: UpdateServiceAccountRequest
      additionalProperties: false
    pomerium.config.UpdateServiceAccountResponse:
      type: object
      properties:
        serviceAccount:
          title: service_account
          description: The updated service account.
          $ref: '#/components/schemas/pomerium.config.ServiceAccount'
        jwt:
          type: string
          title: jwt
          description: A newly issued JWT for the service account.
      title: UpdateServiceAccountResponse
      additionalProperties: false
    pomerium.config.UpdateSettingsRequest:
      type: object
      properties:
        settings:
          title: settings
          description: |-
            Updated Settings record. The Settings `id` selects which record to
             update; sensitive fields not present in the request are preserved from
             the existing record.
          $ref: '#/components/schemas/pomerium.config.Settings'
        updateMask:
          oneOf:
            - $ref: '#/components/schemas/google.protobuf.FieldMask'
            - type: "null"
          title: update_mask
          description: Optional update_mask to only update a subset of the fields.
      title: UpdateSettingsRequest
      additionalProperties: false
    pomerium.config.UpdateSettingsResponse:
      type: object
      properties:
        settings:
          title: settings
          description: The updated Settings record, including any server-modified fields.
          $ref: '#/components/schemas/pomerium.config.Settings'
      title: UpdateSettingsResponse
      additionalProperties: false
    pomerium.config.UpstreamOAuth2:
      type: object
      properties:
        clientId:
          type: string
          title: client_id
          description: The public identifier for an application.
        clientSecret:
          type: string
          title: client_secret
          description: The secret known only to the application and the authorization server.
        oauth2Endpoint:
          title: oauth2_endpoint
          description: The OAuth2 endpoint configuration.
          $ref: '#/components/schemas/pomerium.config.OAuth2Endpoint'
        scopes:
          type: array
          items:
            type: string
          title: scopes
          description: Scope to control what data the OAuth2 server returns.
        authorizationUrlParams:
          type: object
          title: authorization_url_params
          additionalProperties:
            type: string
            title: value
          description: Additional parameters to add to authorization requests.
      title: UpstreamOAuth2
      additionalProperties: false
      description: |-
        Configuration for OAuth2 authorization for an upstream service behind
         Pomerium.
    pomerium.config.UpstreamOAuth2.AuthorizationUrlParamsEntry:
      type: object
      properties:
        key:
          type: string
          title: key
        value:
          type: string
          title: value
      title: AuthorizationUrlParamsEntry
      additionalProperties: false
    pomerium.config.UpstreamTunnel:
      type: object
      properties:
        sshPolicy:
          oneOf:
            - $ref: '#/components/schemas/pomerium.config.PPLPolicy'
            - type: "null"
          title: ssh_policy
          description: PPL policy enforced before the SSH tunnel is opened to the upstream.
        sshPolicyRego:
          type: array
          items:
            type: string
          title: ssh_policy_rego
          description: Rego rules evaluated before the SSH tunnel is opened to the upstream.
        sshPolicyId:
          type:
            - string
            - "null"
          title: ssh_policy_id
          description: ID of a shared policy whose rules also gate this SSH tunnel.
      title: UpstreamTunnel
      additionalProperties: false
      description: |-
        Configuration for an upstream tunnel. Applies to routes whose upstream is
         reached through Pomerium's SSH proxy.
security: []
tags:
  - name: pomerium.config.ConfigService
    description: Manages configuration in Pomerium.
