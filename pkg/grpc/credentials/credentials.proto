syntax = "proto3";

package pomerium.credentials;
option go_package = "github.com/pomerium/pomerium/pkg/grpc/credentials";

import "google/protobuf/timestamp.proto";

message BlobProviderCredential {
  oneof credential_type {
    GCPCredential gcp = 1;
    AzureCredential azure = 2;
    S3Credential s3 = 3;
  }
}

message GCPCredential {
    bytes data = 1;
    string credential_type = 2;
}

message AzureCredential {
    bytes data = 1;
}

message S3Credential {
    bytes data = 1;
}