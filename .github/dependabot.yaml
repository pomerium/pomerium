version: 2
updates:
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 50
    groups:
      docker:
        patterns:
          - "*"
    ignore:
      - dependency-name: node
        update-types: ["version-update:semver-major"]
  - package-ecosystem: "docker"
    directory: "/.github/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 50
    groups:
      docker:
        patterns:
          - "*"
    ignore:
      - dependency-name: node
        update-types: ["version-update:semver-major"]
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 50
    groups:
      github-actions:
        patterns:
          - "*"
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 50
    groups:
      go:
        patterns:
          - "*"
        exclude-patterns:
          - "go.opentelemetry.io/*"
          - "github.com/exaring/otelpgx"
          - "charm.land/*"
          - "github.com/charmbracelet/*"
          - "github.com/muesli/*"
          - "github.com/mattn/go-runewidth"
          - "github.com/lucasb-eyer/go-colorful"
          - "github.com/rivo/uniseg"
          - "github.com/aymanbagabas/go-osc52/*"
          - "github.com/xo/terminfo"
          - "github.com/atotto/clipboard"
          - "github.com/sahilm/fuzzy"
          - "github.com/creack/pty"
          - "k8s.io/*"
      otel:
        patterns:
          - "go.opentelemetry.io/*"
          - "github.com/exaring/otelpgx"
      tui:
        patterns:
          - "charm.land/*"
          - "github.com/charmbracelet/*"
          - "github.com/muesli/*"
          - "github.com/mattn/go-runewidth"
          - "github.com/lucasb-eyer/go-colorful"
          - "github.com/rivo/uniseg"
          - "github.com/aymanbagabas/go-osc52/*"
          - "github.com/xo/terminfo"
          - "github.com/atotto/clipboard"
          - "github.com/sahilm/fuzzy"
          - "github.com/creack/pty"
      kubernetes:
        # Grouped and isolated from the general "go" bumps: the k8s.io/* modules
        # release in lockstep (so they bump together) and drive the k3s e2e
        # test's server image (see testutil.K3sImage), so keeping them in their
        # own PR avoids a k8s bump blocking unrelated dependency updates.
        patterns:
          - "k8s.io/*"
  - package-ecosystem: "gomod"
    directory: "/pkg/grpc/config/"
    schedule:
      interval: "monthly"
    groups:
      go-grpc-config:
        patterns:
          - "*"
  - package-ecosystem: "gomod"
    directory: "/pkg/grpc/databroker/"
    schedule:
      interval: "monthly"
    groups:
      go-grpc-databroker:
        patterns:
          - "*"
  - package-ecosystem: "npm"
    directory: "/ui"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 50
    groups:
      npm:
        patterns:
          - "*"
  - package-ecosystem: "npm"
    directory: "/internal/acceptance/browser"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 50
    groups:
      npm:
        patterns:
          - "*"
  - package-ecosystem: "npm"
    directory: "/internal/acceptance/ws-server"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 50
    groups:
      npm:
        patterns:
          - "*"
