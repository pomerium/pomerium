name: Acceptance Tests

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  acceptance:
    name: E2E Acceptance Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version-file: .tool-versions
          cache: 'npm'
          cache-dependency-path: internal/acceptance/browser/package-lock.json

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version-file: .tool-versions

      - name: Install Playwright dependencies
        working-directory: internal/acceptance/browser
        run: |
          npm ci
          npx playwright install chromium --with-deps

      - name: Run acceptance tests
        working-directory: internal/acceptance
        run: make test
        env:
          CI: true
          # Accept self-signed certificates in test environment
          NODE_TLS_REJECT_UNAUTHORIZED: "0"

      - name: Generate acceptance summary
        if: always()
        working-directory: internal/acceptance/browser
        run: |
          node scripts/generate-summary.mjs >> $GITHUB_STEP_SUMMARY
          node scripts/generate-summary.mjs --output ../artifacts/playwright/summary.md

      - name: Collect artifacts
        if: always()
        working-directory: internal/acceptance
        run: ./scripts/collect-artifacts.sh

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: playwright-report
          path: internal/acceptance/artifacts/playwright/
          retention-days: 30

      - name: Upload Docker logs
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: docker-logs
          path: internal/acceptance/artifacts/docker-logs/
          retention-days: 7

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: diagnostics
          path: internal/acceptance/artifacts/diagnostics/
          retention-days: 7

      - name: Post PR comment
        if: always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false
        uses: marocchino/sticky-pull-request-comment@70d2764d1a7d5d9560b100cbea0077fc8f633987
        with:
          header: acceptance-summary
          path: internal/acceptance/artifacts/playwright/summary.md

      - name: Stop test stack
        if: always()
        working-directory: internal/acceptance
        run: docker compose down -v
