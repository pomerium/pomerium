name: Test
permissions:
  actions: read
  contents: read
on:
  push:
    branches:
      - main
  pull_request:

jobs:
  integration:
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-22.04]
        deployment: [multi, single]
        authenticate-flow: [stateful, stateless]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version-file: .tool-versions
          cache: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: .tool-versions

      - name: set env vars
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: build dev docker image
        run: |
          ./scripts/build-dev-docker.bash

      - name: start cluster
        run: |
          export POMERIUM_TAG=dev
          cd ./integration/clusters/${{matrix.deployment}}-${{matrix.authenticate-flow}}
          docker compose up -d

      - name: integration tests
        run: |
          (cd ./integration/clusters/${{matrix.deployment}}-${{matrix.authenticate-flow}} && docker compose logs -f &)
          go test -tags integration -v ./integration/...

  build:
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 2

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version-file: .tool-versions

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: .tool-versions

      - name: build
        run: make build

      - name: save binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          path: bin/pomerium*
          name: pomerium ${{ github.run_id }} ${{ matrix.platform }}
          retention-days: 1

      - name: test
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60
        with:
          timeout_minutes: 30
          max_attempts: 3
          command: make cover

      - name: Upload base coverage
        if: matrix.platform == 'ubuntu-latest' && github.ref == 'refs/heads/main'
        continue-on-error: true
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: coverage-profile
          path: coverage.txt
          retention-days: 30

      - name: Check for Go changes
        id: coverage-changes
        if: matrix.platform == 'ubuntu-latest' && github.event_name == 'pull_request'
        continue-on-error: true
        run: |
          if git diff --quiet HEAD^1 HEAD -- '*.go'; then
            echo 'changed=false' >> "$GITHUB_OUTPUT"
          else
            echo 'changed=true' >> "$GITHUB_OUTPUT"
          fi

      - name: Find base coverage
        id: coverage-base
        if: matrix.platform == 'ubuntu-latest' && github.event_name == 'pull_request' && steps.coverage-changes.outputs.changed == 'true'
        continue-on-error: true
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        with:
          script: |
            const { data } = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'test.yaml',
              event: 'push',
              head_sha: process.env.BASE_SHA,
              status: 'completed',
              per_page: 10,
            });
            const run = data.workflow_runs.find((run) => run.conclusion === 'success');
            if (run) core.setOutput('run-id', run.id);

      - name: Download base coverage
        id: coverage-download
        if: matrix.platform == 'ubuntu-latest' && github.event_name == 'pull_request' && steps.coverage-changes.outputs.changed == 'true' && steps.coverage-base.outputs.run-id != ''
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: coverage-profile
          path: coverage-base
          github-token: ${{ github.token }}
          run-id: ${{ steps.coverage-base.outputs.run-id }}

      - name: Summarize material Go coverage changes
        if: matrix.platform == 'ubuntu-latest' && github.event_name == 'pull_request' && steps.coverage-changes.outputs.changed == 'true' && steps.coverage-download.outcome == 'success'
        continue-on-error: true
        run: |
          go run ./scripts/coverage_delta.go \
            --base coverage-base/coverage.txt \
            --head coverage.txt \
            --module "$(GOWORK=off go list -m -f '{{.Path}}')" \
            --repository "$GITHUB_REPOSITORY" \
            --sha "$GITHUB_SHA" \
            --run-url "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
            >> "$GITHUB_STEP_SUMMARY"

  build-docker:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5

      - name: Docker Build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a
        with:
          context: .
          file: ./Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  precommit:
    runs-on: ubuntu-22.04
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version-file: .tool-versions
          cache: false

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.x"

      - uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd
        with:
          extra_args: --show-diff-on-failure --from-ref ${{
            github.event.pull_request.base.sha }} --to-ref ${{
            github.event.pull_request.head.sha }}
        env:
          SKIP: lint

  check-docker-images:
    runs-on: ubuntu-22.04
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - run: ./scripts/check-docker-images
